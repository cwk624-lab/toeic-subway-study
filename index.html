    { group: 6, question: "Look at the graphic. What seat will the man choose?", options: ["(A) 1B", "(B) 1D", "(C) 2C", "(D) 3A"], answer: "(B) 1D", explanation: "'a window seat... closest to the front of the compartment' → 좌석도상 앞쪽 창가석은 1D." },
    { group: 7, question: "What does the woman mention about the restaurant?", options: ["(A) It has expanded its dining area.", "(B) It serves vegetarian dishes.", "(C) It opens early on weekends.", "(D) It is popular with her colleagues."], answer: "(B) It serves vegetarian dishes.", explanation: "'it's wonderful to have a vegetarian restaurant'.", script: "M: I hope you enjoyed your meal. W: The pasta was great. I don't eat meat, so it's wonderful to have a vegetarian restaurant close enough to the office that I can stop in for lunch. Um, I have this coupon I would like to use. M: Hmm... It looks like your meal does not qualify for the discount. Please double-check the information at the very bottom of the coupon. W: My apologies. You're right. One more thing... A coworker mentioned that a jewelry shop recently opened nearby. Do you happen to know where it is? M: You must be talking about Feldman's. It's right next door. [Graphic — coupon: 'Only good for dinner (after 6 P.M.)']" },
    { group: 7, question: "Look at the graphic. Why can't the woman use the coupon?", options: ["(A) It has already expired.", "(B) It is not valid at the branch.", "(C) It has a minimum purchase requirement.", "(D) It is not accepted at lunch."], answer: "(D) It is not accepted at lunch.", explanation: "쿠폰 하단에 'Only good for dinner (after 6 P.M.)'인데 점심에 사용하려 함." },
    { group: 7, question: "What does the woman ask the man about?", options: ["(A) A parking fee", "(B) A delivery service", "(C) A store location", "(D) A public event"], answer: "(C) A store location", explanation: "'a jewelry shop recently opened nearby. Do you happen to know where it is?'." },
    { group: 8, question: "What does the woman plan to do?", options: ["(A) Purchase a device", "(B) Try on a garment", "(C) Return some luggage", "(D) Sign up for a membership"], answer: "(A) Purchase a device", explanation: "'I intend to buy a new TV there anyway'. TV → device.", script: "M: Have you seen this flyer about the special promotion going on at Norman's Department Store? W: Oh! They're giving away free gifts when you spend $300 or more. That's great, since I intend to buy a new TV there anyway. M: Do you want to go there this afternoon, then? W: Hmm... I'm actually more interested in the item they're giving away in the third week of June. Let's go next Wednesday, instead. M: OK. Why don't we meet at the bistro across the street and get something to eat, then go shopping? W: Sounds good. [Graphic — June's Gift: 1st week ..., 2nd week ..., 3rd week Blender, 4th week ...]" },
    { group: 8, question: "Look at the graphic. Which gift does the woman want to get?", options: ["(A) Pillow", "(B) Headphones", "(C) Blender", "(D) Suitcase"], answer: "(C) Blender", explanation: "'the item they're giving away in the third week of June' → 표에서 3주차는 Blender." },
    { group: 8, question: "What does the man suggest?", options: ["(A) Making a reservation", "(B) Visiting a restaurant", "(C) Checking a schedule", "(D) Downloading a coupon"], answer: "(B) Visiting a restaurant", explanation: "'Why don't we meet at the bistro across the street and get something to eat'." },
    { group: 9, question: "Where do the speakers most likely work?", options: ["(A) A publishing firm", "(B) A marketing company", "(C) A real estate agency", "(D) A medical clinic"], answer: "(B) A marketing company", explanation: "'our advertising firm's workshop'. advertising firm → marketing company.", script: "M: Patricia, I was just reviewing the seating chart for our advertising firm's workshop, and I noticed a problem. W: Really? What's that? M: One of our directors, Nathan Muller, is currently assigned to a seat in the middle of the auditorium. However, he uses a wheelchair. Can you move him to the section right beside the aisle? W: Oh, I wasn't aware of that. I'll make the change right after I call the caterer. M: Great. Thanks for taking care of that. [Graphic — auditorium: Section 1 beside the Aisle, then 2, 3, 4]" },
    { group: 9, question: "Look at the graphic. Which section will Nathan Muller be seated in?", options: ["(A) Section 1", "(B) Section 2", "(C) Section 3", "(D) Section 4"], answer: "(A) Section 1", explanation: "'move him to the section right beside the aisle' → 통로 옆은 Section 1." },
    { group: 9, question: "What will the woman probably do next?", options: ["(A) Move a table", "(B) Send an e-mail", "(C) Contact a business", "(D) Give a speech"], answer: "(C) Contact a business", explanation: "'I'll make the change right after I call the caterer'. call the caterer → Contact a business." },
    { group: 10, question: "According to the man, what will take place in March?", options: ["(A) A trade exhibition", "(B) A fundraising dinner", "(C) A press conference", "(D) A company party"], answer: "(D) A company party", explanation: "'the new company president's welcome party... held at the beginning of March'.", script: "W: Josh, can you come take a look at this online booking for an event hall at the Bermuda Hotel? M: Sure. Is this for the new company president's welcome party? It's supposed to be held at the beginning of March, right? W: Yes. We need to choose the best day for the event. M: Well, I heard that our finance director will be unavailable from Wednesday, the 5th, since he'll be on an overseas business trip. W: Ah, right. I forgot he's convening with our foreign partners then. In that case, we'd better go for either Monday or Tuesday. M: I think the evening time slot will be better. The executives mentioned they'd prefer a dinner celebration. W: OK. I'll book for that time, then. [Graphic — Available Halls: Hall A Mon 10-12, Hall B Fri 10-12, Hall C Tue 6-8PM, Hall D Wed 6-8PM]" },
    { group: 10, question: "Why is the finance director traveling abroad?", options: ["(A) To use vacation time", "(B) To tour a facility", "(C) To meet with partners", "(D) To present on expenses"], answer: "(C) To meet with partners", explanation: "'he's convening with our foreign partners'." },
    { group: 10, question: "Look at the graphic. What hall will the woman reserve?", options: ["(A) Hall A", "(B) Hall B", "(C) Hall C", "(D) Hall D"], answer: "(C) Hall C", explanation: "월/화 중 + 저녁 시간대, 수요일 불가 → 표에서 화요일 저녁(6-8PM)은 Hall C." },
  ] },
  { day: 12, part: "Part 3", questions: [
    { group: 1, question: "What was recently sent to employees?", options: ["(A) A manual", "(B) A form", "(C) A survey", "(D) A notice"], answer: "(D) A notice", explanation: "'A notice was just e-mailed to all staff members'.", script: "W1: A notice was just e-mailed to all staff members. It states that our institute's new research division director, Samuel Garcia, will be here at the laboratory tomorrow. He will talk about the research work we'll be doing over the coming months. W2: Really? Do you happen to know where he worked before? W1: I heard he was a chemistry professor at a university in France. He apparently held that position for quite a number of years." },
    { group: 1, question: "What will Mr. Garcia talk about?", options: ["(A) Upcoming projects", "(B) Recent hires", "(C) Updated policies", "(D) New facilities"], answer: "(A) Upcoming projects", explanation: "'He will talk about the research work we'll be doing over the coming months'." },
    { group: 1, question: "What was Mr. Garcia's previous workplace?", options: ["(A) An accounting office", "(B) A manufacturing plant", "(C) A health center", "(D) An educational institution"], answer: "(D) An educational institution", explanation: "'he was a chemistry professor at a university in France'. university → educational institution." },
    { group: 2, question: "What is the man preparing?", options: ["(A) A company budget", "(B) A personal check", "(C) A bank statement", "(D) A meeting agenda"], answer: "(A) A company budget", explanation: "'finished preparing next month's budget' → 'I'm actually working on it right now'.", script: "W: Hello, Amos. I was just wondering if you've finished preparing next month's budget yet. M: I'm actually working on it right now. There are a few figures I need to check, but I should be done in a couple of hours. Do you want me to call you when everything's ready? W: Yes, I'd appreciate that. I need to know how much money the company can budget toward our advertising campaign. I'll be in my office, waiting for your call." },
    { group: 2, question: "What does the man offer to do?", options: ["(A) E-mail a document", "(B) Authorize a transaction", "(C) Call the woman later", "(D) Give a presentation"], answer: "(C) Call the woman later", explanation: "'Do you want me to call you when everything's ready?'." },
    { group: 2, question: "Where will the woman be waiting?", options: ["(A) In her office", "(B) At an advertising agency", "(C) In a conference room", "(D) At a call center"], answer: "(A) In her office", explanation: "'I'll be in my office, waiting for your call'." },
    { group: 3, question: "Why does the man want to meet with Ms. Haus?", options: ["(A) To talk about an employee orientation", "(B) To discuss a building design", "(C) To sign a construction contract", "(D) To make a managerial decision"], answer: "(B) To discuss a building design", explanation: "'I want to discuss the design of a new building we are constructing'.", script: "M: Good afternoon. I'd like to speak with Ms. Haus, please. W: I'm sorry, but Ms. Haus is not here at the moment. Is there anything I can do for you? M: I want to discuss the design of a new building we are constructing. Can you tell me when she will be available? W: I'm not sure about that. She's in a meeting with the other board members right now. Perhaps you can return in a few hours. M: OK. I'll come back at around 2 P.M." },
    { group: 3, question: "Who most likely is Ms. Haus?", options: ["(A) A personal assistant", "(B) A material supplier", "(C) An interior decorator", "(D) A company director"], answer: "(D) A company director", explanation: "'She's in a meeting with the other board members right now'." },
    { group: 3, question: "What does the woman recommend?", options: ["(A) Leaving a memo", "(B) Ordering some supplies", "(C) Revising a plan", "(D) Coming back later on"], answer: "(D) Coming back later on", explanation: "'Perhaps you can return in a few hours'." },
    { group: 4, question: "What are the speakers mainly discussing?", options: ["(A) Changes to a schedule", "(B) A project timeline", "(C) Accommodations for a vacation", "(D) An evening meal"], answer: "(A) Changes to a schedule", explanation: "'I'd like to adjust it[itinerary]'. adjust → Changes.", script: "M: Jackie, I was looking over my itinerary for next week's business trip to Chicago, and... I'd like to adjust it. W: What in particular do you want changed? M: I'd like to extend my stay to five nights. W: OK. So, you want to come back on March 29? M: Exactly. One of the prospective clients who I'm meeting with in Chicago needs to postpone our appointment by a day. W: All right. It's good that you let me know now because your flight tickets will be reserved today." },
    { group: 4, question: "Why is the man going to Chicago?", options: ["(A) To inspect company facilities", "(B) To meet possible new clients", "(C) To purchase some equipment", "(D) To lead a training seminar"], answer: "(B) To meet possible new clients", explanation: "'the prospective clients who I'm meeting with in Chicago'. prospective → possible." },
    { group: 4, question: "What does the woman mention about the flight tickets?", options: ["(A) They are nonrefundable.", "(B) They will be very costly.", "(C) They were paid for by the company.", "(D) They will be booked today."], answer: "(D) They will be booked today.", explanation: "'your flight tickets will be reserved today'. reserved → booked." },
    { group: 5, question: "What problem does the woman mention?", options: ["(A) Some products are defective.", "(B) Some clients are asking for samples.", "(C) Some supplies are running low.", "(D) Some boxes are the incorrect size."], answer: "(C) Some supplies are running low.", explanation: "'we're almost out of cardboard boxes'.", script: "W: Peter, I just checked the supply room, and we're almost out of cardboard boxes. I'm worried that there aren't enough for the product samples we need to send to our clients tomorrow. M: Oh, check the storage room in the basement. I put 20 there last week. W: We used those ones yesterday. I still need about 40 more. M: There's a store down the street that sells shipping supplies, but their prices are a little high. Why don't I order some online? They will be delivered tomorrow morning, and you can ship the products in the afternoon." },
    { group: 5, question: "What did the man do last week?", options: ["(A) Resolved a customer complaint", "(B) Compared prices of retailers", "(C) Placed items in storage", "(D) Confirmed a delivery time"], answer: "(C) Placed items in storage", explanation: "'I put 20 there[storage room] last week'. put → Placed." },
    { group: 5, question: "What does the man offer to do?", options: ["(A) Make an online order", "(B) Visit a nearby store", "(C) Send a shipment", "(D) Package an item"], answer: "(A) Make an online order", explanation: "'Why don't I order some online?'." },
    { group: 6, question: "What are the speakers talking about?", options: ["(A) Software programs", "(B) Electronic devices", "(C) Printed materials", "(D) Company vehicles"], answer: "(B) Electronic devices", explanation: "'the five fax machines we sent out for repairs'. fax machines → Electronic devices.", script: "M: Good morning. This is Dennis Park from the Elton Company. I'm calling to check on the five fax machines we sent out for repairs a week ago. W: Hello, Mr. Park. Two of the devices are still in the service center, but all of them should be ready later today. M: Oh, OK. So what time can I come by to pick them up? W: I'll have to talk to the technician in charge at the service center to find out. I'll call you before noon to let you know." },
    { group: 6, question: "What will most likely happen today?", options: ["(A) Items will be delivered.", "(B) Repairs will be completed.", "(C) A payment will be refunded.", "(D) A demonstration will be given."], answer: "(B) Repairs will be completed.", explanation: "'all of them should be ready later today'." },
    { group: 6, question: "What will the woman most likely do next?", options: ["(A) Assemble some devices", "(B) Meet with a customer", "(C) Speak with a technician", "(D) Exchange some products"], answer: "(C) Speak with a technician", explanation: "'I'll have to talk to the technician'. talk to → Speak with." },
    { group: 7, question: "What does the woman say about the report?", options: ["(A) It was written by a consultant.", "(B) It covers various company departments.", "(C) It shows low sales for a region.", "(D) It was modified recently."], answer: "(C) It shows low sales for a region.", explanation: "'it shows our sales figures were low in the northeast region'. (3인 대화)", script: "M1: What do you both think about the marketing research report? W: I was surprised that it shows our sales figures were low in the northeast region. M2: Yeah. We just launched a new TV advertisement in that area, but it didn't do well. I think consumers there respond better to social media promotions. M1: Really? We should come up with new ideas for our social media page, then. W: Good idea. Jim, could you show the page on your laptop? M2: Sure. Why don't we ask Mike from the Web design team to take a look, too? W: I thought of that, but, well... he's currently on leave." },
    { group: 7, question: "What does the woman ask Jim to do?", options: ["(A) View a TV advertisement", "(B) Display a Web page", "(C) Update a directory", "(D) Request a budget increase"], answer: "(B) Display a Web page", explanation: "'Jim, could you show the page on your laptop?'. show → Display." },
    { group: 7, question: "What does the woman imply when she says, \"he's currently on leave\"?", options: ["(A) She does not have an alternative.", "(B) She will explain a decision.", "(C) She has received a criticism.", "(D) She cannot accept a suggestion."], answer: "(D) She cannot accept a suggestion.", explanation: "Mike에게 봐달라는 제안에 그가 휴가 중이라며 제안을 받아들일 수 없음을 의도." },
    { group: 8, question: "What most likely is the man's job?", options: ["(A) Event planner", "(B) Personal assistant", "(C) Conference organizer", "(D) Human resources director"], answer: "(B) Personal assistant", explanation: "'She often compliments the work you do as her assistant'.", script: "M: I'm considering asking our manager, Ms. Dupree for a raise. It's been two years since my last one. W: That seems fair. She often compliments the work you do as her assistant. M: I'm just worried she'll say no. W: But it's worth approaching her about it. Why don't you talk to her when she gets back from the public relations conference that's taking place tomorrow? M: All right. I'll see if she has some time to talk to me in the afternoon." },
    { group: 8, question: "What does the woman suggest doing?", options: ["(A) Applying for a position", "(B) Changing a workspace", "(C) Accepting a benefits package", "(D) Talking to a superior"], answer: "(D) Talking to a superior", explanation: "'Why don't you talk to her[manager]'. talk to manager → Talking to a superior." },
    { group: 8, question: "According to the woman, what will happen tomorrow?", options: ["(A) An industry event will be held.", "(B) A social media campaign will begin.", "(C) A promotion will be announced.", "(D) A speech will be given."], answer: "(A) An industry event will be held.", explanation: "'the public relations conference that's taking place tomorrow'. conference → industry event." },
    { group: 9, question: "What are the speakers mainly discussing?", options: ["(A) A venue switch", "(B) A work gathering", "(C) A restaurant renovation", "(D) A dinner menu"], answer: "(B) A work gathering", explanation: "'organizing our official team dinner for tomorrow night'. team dinner → work gathering.", script: "W: Hi, Brad. Are you organizing our official team dinner for tomorrow night? M: Yes. I've made a reservation at the Japanese restaurant down the street. W: Oh, I'm sorry. But could you add one more person to our party? The new intern is coming too. M: Sure. Inviting the intern is a great idea. She'll get to become better acquainted with our team. W: One last thing. You booked a private room, right? M: I did. And the one I reserved holds more than seven people, so it'll still work. W: Great. Thanks for handling that. [Graphic — Maximum Occupancy: Green Room 2, Red Room 4, Blue Room 6, Purple Room 8]" },
    { group: 9, question: "What problem does the woman mention?", options: ["(A) A meeting was canceled.", "(B) A credit card was denied.", "(C) A group has increased.", "(D) A promotion has ended."], answer: "(C) A group has increased.", explanation: "'could you add one more person to our party?'. add one more → group has increased." },
    { group: 9, question: "Look at the graphic. What room did the man probably book?", options: ["(A) Green Room", "(B) Red Room", "(C) Blue Room", "(D) Purple Room"], answer: "(D) Purple Room", explanation: "'holds more than seven people' → 표에서 8명 수용은 Purple Room." },
    { group: 10, question: "What is the woman surprised about?", options: ["(A) The size of a new store", "(B) The cost of a parking service", "(C) The types of promotional offers", "(D) The number of visitors at a mall"], answer: "(D) The number of visitors at a mall", explanation: "'I'm shocked by how many people are at the mall today'.", script: "W: Hey, Jerome. I'm shocked by how many people are at the mall today. M: Yeah, it's busy due to the upcoming holidays. W: Some shoppers have asked for help finding parking spots, but I'm not sure where to direct them. M: I spoke with one of our coworkers a few minutes ago, and he said that Lot D has multiple open spots. W: Well, that parking area is on the opposite side of the mall. People might not want to drive that far. M: If that's the case, send shoppers to the lot near the Lincoln Street entrance. Aside from the other one I mentioned, it has the most open spots. [Graphic — Available Spots: Lot A ~5, Lot B ~20, Lot C ~10, Lot D ~42]" },
    { group: 10, question: "What did the man recently do?", options: ["(A) Spoke to a colleague", "(B) Handed out parking tickets", "(C) Set up a sign", "(D) Assisted some customers"], answer: "(A) Spoke to a colleague", explanation: "'I spoke with one of our coworkers a few minutes ago'." },
    { group: 10, question: "Look at the graphic. Where will the woman most likely direct shoppers to?", options: ["(A) Lot A", "(B) Lot B", "(C) Lot C", "(D) Lot D"], answer: "(B) Lot B", explanation: "'the lot near the Lincoln Street entrance. Aside from the other one[Lot D], it has the most open spots' → Lot D 제외 최다는 Lot B(~20)." },
  ] },
  { day: 13, part: "Part 3", questions: [
    { group: 1, question: "What are the speakers mainly discussing?", options: ["(A) A building inspection", "(B) A property purchase", "(C) A retail space", "(D) A renovation project"], answer: "(B) A property purchase", explanation: "'the house on Bayer Street you offered to buy'. house→property.", script: "M: This is Daniel Chandler from Core Real Estate calling for Maria Owens. I have some details for you regarding the house on Bayer Street you offered to buy. W: Oh, great. Did Mr. Lewis accept the amount I proposed? M: Yes, he did. I recommend that you stop by the agency tomorrow so that I can review the contract with you. W: All right. I'll call you back once I check my schedule." },
    { group: 1, question: "What did Mr. Lewis do?", options: ["(A) Signed a contract", "(B) Went to a real estate office", "(C) Agreed to a proposal", "(D) Checked a listing"], answer: "(C) Agreed to a proposal", explanation: "'Did Mr. Lewis accept the amount I proposed?' → 'Yes, he did.'" },
    { group: 1, question: "What does the man suggest the woman do?", options: ["(A) Visit an office", "(B) Post an advertisement", "(C) E-mail a client", "(D) Make a payment"], answer: "(A) Visit an office", explanation: "'stop by the agency tomorrow'." },
    { group: 2, question: "Where are the speakers?", options: ["(A) At a taxi stand", "(B) On a train", "(C) On an airplane", "(D) At a subway station"], answer: "(B) On a train", explanation: "'It should be placed in the train's luggage compartment'.", script: "W: I'm sorry, sir, but it looks like your suitcase is too large to fit into that overhead bin. It should be placed in the train's luggage compartment. M: Will it have to stay there during the entire trip? W: Yes. You can retrieve it when we reach our destination in a few hours. M: Hmm... All right. But I need to get my laptop from the front pocket first. That way I can review some work documents during the trip. W: That's fine. Is there anything else you need? M: Are there blankets available for passengers? I'm a bit chilly. W: Yes, there are. I'll get one for you in a few minutes." },
    { group: 2, question: "What does the man say he will do?", options: ["(A) Change his seat assignment", "(B) Take out a device from a bag", "(C) Show an attendant his ticket", "(D) Retrieve a lost item"], answer: "(B) Take out a device from a bag", explanation: "'I need to get my laptop from the front pocket first'." },
    { group: 2, question: "What will the woman most likely do next?", options: ["(A) Bring a blanket", "(B) Print some vouchers", "(C) Access an account", "(D) Use some equipment"], answer: "(A) Bring a blanket", explanation: "'Are there blankets available?' → 'I'll get one for you'." },
    { group: 3, question: "Who most likely is the man?", options: ["(A) A tour guide", "(B) A city official", "(C) An airport employee", "(D) A travel agent"], answer: "(C) An airport employee", explanation: "'Thank you for calling Morrison Airport's guest services desk'.", script: "M: Thank you for calling Morrison Airport's guest services desk. This is Kenneth speaking. How can I help you? W: I booked a flight for Friday, but I'm concerned the snowstorm will cause delays. Do you have any information about that? M: The forecast shows that it will end quickly and there will be clear skies tomorrow. So, as of now, there are no cancellations on your departure date. W: That's a relief. I was worried I would have to postpone my trip. M: Don't forget to check our Web site for updates closer to when you leave. W: Thanks. I'll do that." },
    { group: 3, question: "According to the man, what will happen tomorrow?", options: ["(A) Weather conditions will improve.", "(B) A departure time will be confirmed.", "(C) Passenger numbers will increase.", "(D) A cancellation will be announced."], answer: "(A) Weather conditions will improve.", explanation: "'it will end quickly and there will be clear skies tomorrow'." },
    { group: 3, question: "What does the man remind the woman to do?", options: ["(A) Check a Web site", "(B) Download an application", "(C) Update a trip itinerary", "(D) Change a reservation date"], answer: "(A) Check a Web site", explanation: "'Don't forget to check our Web site for updates'." },
    { group: 4, question: "Where most likely does the conversation take place?", options: ["(A) At a car dealership", "(B) At a parking facility", "(C) At a repair shop", "(D) At a rental agency"], answer: "(A) At a car dealership", explanation: "'I'd like to buy a new car' + 시승·모델 권유.", script: "W: Good morning. I'd like to buy a new car. I was hoping to take a couple of test drives this afternoon. M: I would be happy to help you. We just got the latest model of the two-seater Devi Sports Coupe. Why don't you take that one for a drive? W: Well, my husband and I have a child. We're interested in a vehicle with lots of safety features. M: I understand. Well, have you considered a van? It would be perfect for you. Let me show you some of the models we have." },
    { group: 4, question: "Why does the woman say, \"my husband and I have a child\"?", options: ["(A) To offer an alternative", "(B) To select an option", "(C) To confirm a decision", "(D) To reject a suggestion"], answer: "(D) To reject a suggestion", explanation: "2인승 쿠페 권유에 안전 기능 많은 차를 원한다며 거절." },
    { group: 4, question: "What will the speakers most likely do next?", options: ["(A) Put on some safety gear", "(B) Talk to a technician", "(C) Process a payment", "(D) Look at some vehicles"], answer: "(D) Look at some vehicles", explanation: "'Let me show you some of the models we have'." },
    { group: 5, question: "What are the speakers mainly discussing?", options: ["(A) A musical performance", "(B) An art class", "(C) A cultural festival", "(D) A museum exhibit"], answer: "(D) A museum exhibit", explanation: "'Sharon Norman was displaying her sculptures at The Wilford Metropolitan Museum'. displaying→exhibit. (3인 대화)", script: "M1: Wow! I didn't realize Sharon Norman was displaying her sculptures at The Wilford Metropolitan Museum this month. W: Really? Her art is supposed to be amazing. I read an interview with her in Modern Art Magazine, and I was quite impressed. M2: Why don't we go to the museum on Saturday to see her pieces? W: Um, I have a dentist appointment that day. M1: Then, do you want to view the exhibit next Friday afternoon? M2: That works for me. W: I'm free that day as well. And I'll buy the passes for everyone." },
    { group: 5, question: "What is mentioned about Sharon Norman?", options: ["(A) She made a donation.", "(B) She conducted a lecture.", "(C) She founded a company.", "(D) She gave an interview."], answer: "(D) She gave an interview.", explanation: "'I read an interview with her in Modern Art Magazine'." },
    { group: 5, question: "What does the woman offer to do?", options: ["(A) Purchase some tickets", "(B) Check a schedule", "(C) Arrange a tour", "(D) E-mail some directions"], answer: "(A) Purchase some tickets", explanation: "'I'll buy the passes for everyone'." },
    { group: 6, question: "Where most likely are the speakers?", options: ["(A) At a storage facility", "(B) At a customer service center", "(C) At a manufacturing plant", "(D) At a retail outlet"], answer: "(D) At a retail outlet", explanation: "'This sofa is our best-selling item... on sale this week'.", script: "M: This sofa is our best-selling item. It folds out into a bed for two as well. The retail price is $999, but it's on sale this week for only $799. W: Wow, that's exactly what I was looking for. I'm just wondering though, would there be any assembly required? M: Well, all our products come with instructions for assembly. It's a straightforward process that only takes about half an hour. W: Hmm... I'm not really good at that sort of thing. Could I arrange to have someone do it for me? M: Sure. We can have a customer service agent help you by visiting your house for $20. W: Alright then, I'll take one in beige. Could you deliver it right away?" },
    { group: 6, question: "What is available for an additional fee?", options: ["(A) Assistance with assembly", "(B) Insurance for damage", "(C) Installation of software", "(D) Upgrades to devices"], answer: "(A) Assistance with assembly", explanation: "'a customer service agent help you by visiting your house for $20'." },
    { group: 6, question: "What does the woman ask the man to do?", options: ["(A) Provide a manual", "(B) Meet with an interior designer", "(C) Deliver an item", "(D) Call a vendor"], answer: "(C) Deliver an item", explanation: "'Could you deliver it right away?'." },
    { group: 7, question: "What is the woman's problem?", options: ["(A) She did not arrive on time.", "(B) She forgot to make an appointment.", "(C) She went to the wrong building.", "(D) She cannot get a prescription."], answer: "(A) She did not arrive on time.", explanation: "'I'm late for my appointment with Dr. Dawson'.", script: "W: Good morning. My name is Malory Bartle. I'm late for my appointment with Dr. Dawson. M: Unfortunately, Dr. Dawson is meeting with another patient. He did so after waiting for you for over 15 minutes. W: Is it possible to meet with him a little bit later? M: I'll have to ask him. Why don't you take a seat in the lobby? I'll inform you of his availability shortly. W: Sure. How long will I have to wait for the doctor to be available? M: He just brought a patient into the examination room. He'll be finished in half an hour." },
    { group: 7, question: "What does the man suggest the woman do?", options: ["(A) Contact a physician", "(B) Fill out a form", "(C) Wait in a lobby", "(D) Come back later"], answer: "(C) Wait in a lobby", explanation: "'Why don't you take a seat in the lobby?'." },
    { group: 7, question: "What is mentioned about Dr. Dawson?", options: ["(A) He is looking forward to a meeting.", "(B) He has to leave a facility.", "(C) He needs to examine a machine.", "(D) He will be available in half an hour."], answer: "(D) He will be available in half an hour.", explanation: "'He'll be finished in half an hour'." },
    { group: 8, question: "What did the man do yesterday evening?", options: ["(A) He toured a concert hall.", "(B) He purchased a book.", "(C) He reserved some tickets.", "(D) He went to a theater."], answer: "(D) He went to a theater.", explanation: "'I saw a new play at the Hardwood Theater last night'.", script: "M: Hi, Kathy. I saw a new play at the Hardwood Theater last night. W: The Vultures' Daughters? How was it? I heard that the critics gave it great reviews. They praised the story for the unexpected plot twist at the end. M: Yes, and it also has a great cast. I went with a few of my friends and we really enjoyed it. I think there are still tickets for tomorrow. Why don't you go watch it? W: Oh, I don't think I can make it because I'll be attending a college reunion that night. It sounds really interesting though. Maybe I will see if I can get tickets for Saturday or Sunday." },
    { group: 8, question: "According to the woman, what do critics like about The Vultures' Daughters?", options: ["(A) It is well written.", "(B) It is very dramatic.", "(C) It has a surprise ending.", "(D) It has a great director."], answer: "(C) It has a surprise ending.", explanation: "'the unexpected plot twist at the end'." },
    { group: 8, question: "Why is the woman not free tomorrow?", options: ["(A) She needs to work overtime.", "(B) She will be giving a college lecture.", "(C) She is attending another event.", "(D) She will be visiting a patient."], answer: "(C) She is attending another event.", explanation: "'I'll be attending a college reunion that night'." },

    { group: 5, question: "What type of building is being designed?", options: ["(A) A community center", "(B) A retail outlet", "(C) A stadium", "(D) A theater"], answer: "(C) A stadium", explanation: "'the lead architect for the Nexus Sports Facility ... a concern with the arena design'이라며 스포츠 경기장을 설계 중이라고 했으므로 (C)가 정답.", script: "Good morning, Mr. Boyle. This is Matthew Wilson from Edge Architecture. As you know, I've been assigned as the lead architect for the Nexus Sports Facility. I'm calling regarding a concern with the arena design. I'm not sure we'll be able to incorporate as many box seats as you requested. Doing so would considerably reduce the number of standard seats available. Tonight, I'm going to e-mail you a revised building plan that addresses this matter. Please look it over and let me know what you think." },

    { group: 5, question: "What will the speaker do later this evening?", options: ["(A) Set up a meeting", "(B) Send a message", "(C) Request a building permit", "(D) Review a budget proposal"], answer: "(B) Send a message", explanation: "'Tonight, I'm going to e-mail you a revised building plan'이라며 오늘 저녁 이메일을 보낼 것이라고 했으므로 (B)가 정답.", script: "Good morning, Mr. Boyle. This is Matthew Wilson from Edge Architecture. As you know, I've been assigned as the lead architect for the Nexus Sports Facility. I'm calling regarding a concern with the arena design. I'm not sure we'll be able to incorporate as many box seats as you requested. Doing so would considerably reduce the number of standard seats available. Tonight, I'm going to e-mail you a revised building plan that addresses this matter. Please look it over and let me know what you think." },
    { group: 6, question: "What is the purpose of the talk?", options: ["(A) To thank some donors", "(B) To introduce a keynote speaker", "(C) To promote a medical product", "(D) To present an award"], answer: "(A) To thank some donors", explanation: "'We are gathered here to honor our valued contributors ... sincerely thank all of you for your support'라며 기부자들에게 감사하려는 자리라고 했으므로 (A)가 정답.", script: "Good evening, everyone. We are gathered here to honor our valued contributors. Our company would not be able to conduct studies and develop medical products without your funding and support. Tonight, I would also like to recognize our most recent sponsor, Dr. Christopher Fox, who has been a professor at the Massachusetts Medical School for 20 years. He recently donated $3 million for diabetes research and is convinced that many people will benefit from the results of this study. We at the International Biotechnology Group sincerely thank all of you for your support and trust. Enjoy the special dinner and live music we have prepared for you." },

    { group: 8, question: "Who is Denzel Vegas?", options: ["(A) A professor", "(B) A news reporter", "(C) An executive officer", "(D) A computer expert"], answer: "(A) A professor", explanation: "'Denzel Vegas, a famous psychologist who teaches at the University of the Orient'이라며 대학에서 가르치는 심리학자라고 했으므로 (A)가 정답.", script: "And now we have a special guest, Denzel Vegas, a famous psychologist who teaches at the University of the Orient. He has conducted numerous studies about stress-related problems among office employees. In his papers, he discusses how too much work can cause stress. People who devote all their time to work and neglect other areas of their lives, such as relationships, hobbies, and exercise, are at a higher risk for stress. Dr. Vegas is here to tell us more about the methods of managing stress. Unfortunately, however, he is having issues with his laptop, so we won't be able to view his slideshow. Now, let's give him a warm welcome." },

    { group: 9, question: "What is mentioned about a trade fair?", options: ["(A) It will start this weekend.", "(B) It will be covered by the media.", "(C) It will be held overseas.", "(D) It will last for five days."], answer: "(D) It will last for five days.", explanation: "'We will participate in all five days of the event'라며 무역 박람회가 5일간 진행된다고 했으므로 (D)가 정답.", script: "I'm pleased to tell you that preparations for next month's trade fair are going very well. We will participate in all five days of the event, and our booth is located in a great spot in the convention center. I've also received the flyers that we ordered for the fair. The printer gave us a discount, so they cost a little less than we expected. Now, before we end our meeting, please watch this short video that we'll show attendees. It highlights our newest product line. [Graphic — Trade Fair Expenses: Booth Rental $75, Transportation $450, Promotional Materials $260, Accommodations $325, Total $1,110]" },

    { group: 10, question: "Why is the speaker calling?", options: ["(A) To inquire about a parcel", "(B) To process an order", "(C) To promote a device", "(D) To respond to an inquiry"], answer: "(D) To respond to an inquiry", explanation: "'You recently left a voice mail asking about our company's warranty policy. I'm calling to respond to that inquiry'라며 문의에 답하려 전화했다고 했으므로 (D)가 정답.", script: "This message is for Vanessa Meyers. Ms. Meyers, I'm an employee at Vincent Manufacturing. You recently left a voice mail asking about our company's warranty policy. I'm calling to respond to that inquiry. According to my records, you want to know if your sewing machine qualifies for a replacement. Unfortunately, it does not. I'm very sorry, but the product you bought last year is no longer covered by its 10-month manufacturer's warranty. It expired in June. If you have any other questions regarding your machine, don't hesitate to contact us. Have a pleasant day. [Graphic — Product / Warranty Period: Line RS 6 months, Tubro 12 8 months, Gibson XR 10 months, Eternity 3 12 months]" },

  { day: 17, part: "Part 4", questions: [
    { group: 1, question: "What does the speaker say about a business trip?", options: ["(A) It will start on Monday.", "(B) It has been postponed.", "(C) It is occurring abroad.", "(D) It is for company executives."], answer: "(C) It is occurring abroad.", explanation: "'I'm currently on a business trip overseas'. overseas = abroad.", script: "Thank you for calling the office of Natalie Merrill in the human resources department. I'm currently on a business trip overseas and will return to work next Monday, September 2. I'll be checking my e-mail infrequently, so any urgent issues may be directed to my administrative assistant's mobile number at 555-2388. Other requests related to the ongoing payroll matters will be handled by Dale Peters in my absence. He may be reached by dialing extension 3455. Please leave a message at the tone, and I'll return your call in a timely manner. Thank you." },
    { group: 1, question: "How can urgent issues be dealt with?", options: ["(A) By visiting an office", "(B) By calling an assistant", "(C) By dialing an extension", "(D) By e-mailing an administrator"], answer: "(B) By calling an assistant", explanation: "'urgent issues may be directed to my administrative assistant's mobile number'." },
    { group: 1, question: "What does the speaker suggest about Dale Peters?", options: ["(A) He agreed to assist a coworker.", "(B) He is away from his workspace.", "(C) He was recently hired.", "(D) He submitted a form on time."], answer: "(A) He agreed to assist a coworker.", explanation: "'Other requests... will be handled by Dale Peters in my absence' → 동료를 돕기로 함. (정답 인쇄가 페이지 밖으로 잘려 스크립트로 추론, 신뢰도 보통)" },
    { group: 2, question: "What is the message mainly about?", options: ["(A) An orientation session", "(B) A client meeting", "(C) A product launch", "(D) A press conference"], answer: "(B) A client meeting", explanation: "'your plans to meet with our clients in Paris next month'.", script: "Ms. Harlow, it's Benjamin calling. I have important news regarding your plans to meet with our clients in Paris next month. Unfortunately, the representatives from Blackstone Footwear can no longer meet on April 3. I'm worried their new proposed dates are going to be a problem, but I'd like to hear what you think. I forwarded you an e-mail with the details. Please get back to me as soon as possible. I know you're presenting a report to the shareholders this afternoon, but the representatives from Blackstone want to finalize arrangements today." },
    { group: 2, question: "What does the speaker mean when he says, \"I forwarded you an e-mail with the details\"?", options: ["(A) A project has been canceled.", "(B) A contract should be extended.", "(C) A schedule must be reviewed.", "(D) A proposal was accepted."], answer: "(C) A schedule must be reviewed.", explanation: "'their new proposed dates are going to be a problem, but I'd like to hear what you think' → 새 일정 검토 필요." },
    { group: 2, question: "According to the speaker, what must the listener do this afternoon?", options: ["(A) Give a presentation", "(B) Book a flight", "(C) Turn in an assignment", "(D) Talk to reporters"], answer: "(A) Give a presentation", explanation: "'you're presenting a report to the shareholders this afternoon'." },
    { group: 3, question: "According to the speaker, what did Mr. Belding do?", options: ["(A) Moved to a small town", "(B) Wrote a book", "(C) Worked as a salesperson", "(D) Organized an art exhibit"], answer: "(B) Wrote a book", explanation: "'Mr. Balding is the author of best-selling novel Sweet Dreams'.", script: "You're listening to WZRC Radio. Today we have Frederick Balding on our show. Mr. Balding is the author of best-selling novel Sweet Dreams, which is about a young boy growing up in a rural town. In the first part of our show, we'll discuss his plan to visit bookstores across the country during his promotional tour next month. And in the second part, I'll ask Mr. Balding 10 questions submitted through our social media application. It's a great way for you to interact with our guests. So, let's get going. I'm delighted to welcome Frederick Balding." },
    { group: 3, question: "What will be discussed during the first part of the show?", options: ["(A) A publicity tour", "(B) A store opening", "(C) An online service", "(D) A charity project"], answer: "(A) A publicity tour", explanation: "'his promotional tour next month'. promotional → publicity." },
    { group: 3, question: "Why does the speaker say, \"It's a great way for you to interact with our guests\"?", options: ["(A) To suggest that listeners buy a ticket", "(B) To identify the goal of a media company", "(C) To encourage listeners to use an application", "(D) To ask listeners to call a radio station"], answer: "(C) To encourage listeners to use an application", explanation: "소셜 미디어 앱으로 질문을 제출하는 것을 언급한 뒤 앱 사용 권장." },
    { group: 4, question: "What is mentioned about the special exhibit?", options: ["(A) It will last for a month.", "(B) It will contain interactive screens.", "(C) It is expected to draw large crowds.", "(D) It is going to include videos."], answer: "(A) It will last for a month.", explanation: "'Throughout the month of June, we will be presenting a very special exhibit'.", script: "Attention all Science Museum visitors. Throughout the month of June, we will be presenting a very special exhibit. Entitled The Gas Giant, the exhibit will focus on the largest planet in our solar system—Jupiter. While this exhibit is running, the museum will stay open until 8 P.M. so that visitors can enjoy it in the evening. Visitors should also note that the exhibit includes a great deal of technical information, so viewing it with a guide is highly encouraged." },
    { group: 4, question: "What does the speaker imply about the Science Museum?", options: ["(A) It will charge an additional fee.", "(B) It will extend its operating hours.", "(C) It will renovate its exhibit hall.", "(D) It will offer a student discount."], answer: "(B) It will extend its operating hours.", explanation: "'the museum will stay open until 8 P.M.'." },
    { group: 4, question: "What does the speaker suggest doing?", options: ["(A) Arriving at an event early", "(B) Reading about an exhibit online", "(C) Buying passes in advance", "(D) Taking a guided tour"], answer: "(D) Taking a guided tour", explanation: "'viewing it with a guide is highly encouraged'." },
    { group: 5, question: "According to the speaker, what will happen on May 1?", options: ["(A) A center will be upgraded.", "(B) A facility will open.", "(C) A Web site will be launched.", "(D) A sale will end."], answer: "(B) A facility will open.", explanation: "'the grand opening of the Oakville Fitness Center on May 1'.", script: "Are you looking to get into shape for the summer? If so, come to the grand opening of the Oakville Fitness Center on May 1. This center will include a gym with the latest equipment, an Olympic-sized swimming pool, as well as squash and racquetball courts. Our classes are led by instructors who have worked in the industry for a minimum of five years. In the month of May, the Oakville Fitness Center will be offering complimentary three-day trial memberships. This will be for the first 50 customers. Visit our Web site for more information about this opportunity. We hope to see you soon!" },
    { group: 5, question: "What is mentioned about the instructors?", options: ["(A) They will offer free consultations.", "(B) They have several years of experience.", "(C) They are former professional athletes.", "(D) They charge reasonable fees."], answer: "(B) They have several years of experience.", explanation: "'instructors who have worked in the industry for a minimum of five years'." },
    { group: 5, question: "Why does the speaker say, \"This will be for the first 50 customers\"?", options: ["(A) The listeners will receive confirmation soon.", "(B) A facility will be crowded.", "(C) The listeners should act quickly.", "(D) A pass can be used only once."], answer: "(C) The listeners should act quickly.", explanation: "무료 체험 회원권이 선착순 50명 → 빨리 행동해야 함." },
    { group: 6, question: "Why does the speaker say, \"Do you work on Saturday\"?", options: ["(A) To offer a part-time position", "(B) To ask about an appointment time", "(C) To specify a conference date", "(D) To announce a schedule change"], answer: "(B) To ask about an appointment time", explanation: "검진일 변경 후 다음 날 가능 시간을 안내하며 예약 시간 문의.", script: "Good morning, Mr. Greer. This is Janice Forsberg calling from the Eastside Medical Clinic regarding your checkup on November 18. Unfortunately, Dr. Lee was asked to speak at a conference that day. We are very sorry for the inconvenience. Do you work on Saturday? Dr. Lee is available the following day at 10:30 A.M. and 2:30 P.M. Could you please contact me at 555-6573 and let me know which time you prefer? Also, don't forget that you will need to take a blood test, so make sure to prepare. If you are unsure what to do, please review the directions I sent you by e-mail last Tuesday. I think that is everything. Thanks." },
    { group: 6, question: "What does the speaker ask the listener to do?", options: ["(A) Make a payment", "(B) Confirm an address", "(C) Return a call", "(D) Send an e-mail"], answer: "(C) Return a call", explanation: "'Could you please contact me at 555-6573'." },
    { group: 6, question: "What did the speaker send to the listener?", options: ["(A) A letter from a physician", "(B) Instructions for a procedure", "(C) A bill for a service", "(D) Directions to a clinic"], answer: "(D) Directions to a clinic", explanation: "'please review the directions I sent you by e-mail'." },
    { group: 7, question: "Where are the listeners?", options: ["(A) At a retirement party", "(B) At a charity banquet", "(C) At a business meeting", "(D) At an award ceremony"], answer: "(D) At an award ceremony", explanation: "'I certainly didn't expect to receive an award from the National Music Association'.", script: "I've always been proud of my career, but I certainly didn't expect to receive an award from the National Music Association. It's an incredible honor. While there are many people who've helped me along the way, the most significant person has been Sandy Mitchell, the director of Systems Records. Ms. Mitchell offered me my first recording contract when I started performing 10 years ago. She has also supported me throughout my career. I am particularly grateful that she arranged for me to perform in several European cities next month. Without her, I wouldn't be where I am today." },
    { group: 7, question: "What is suggested about Ms. Mitchell?", options: ["(A) She has arranged a music class at an institution.", "(B) She has recently signed a contract with a new performer.", "(C) She has worked in an industry for a long time.", "(D) She has regularly performed with famous musicians."], answer: "(C) She has worked in an industry for a long time.", explanation: "'offered me my first recording contract... 10 years ago. She has also supported me throughout my career'." },
    { group: 7, question: "What will happen next month?", options: ["(A) A tour will be held.", "(B) An album will be released.", "(C) A concert will be canceled.", "(D) A band will be formed."], answer: "(A) A tour will be held.", explanation: "'perform in several European cities next month' = 투어." },
    { group: 8, question: "Who most likely is the speaker?", options: ["(A) A radio host", "(B) A traffic officer", "(C) A construction worker", "(D) A car repairperson"], answer: "(A) A radio host", explanation: "'Now for the evening traffic update... Stay tuned to 103.4'.", script: "Now for the evening traffic update. The Field Street Bridge has been closed due to an accident involving seven cars. As of yet, we've received no word on the cause of the incident. However, it has been reported that emergency vehicles are there, and it'll likely be another two hours before all four lanes are open. In the meantime, commuters are advised to take Fowler Bridge, which can be accessed from Second Avenue. You may need to leave a bit earlier, though. This bridge has only one lane running in each direction. Stay tuned to 103.4 for more traffic updates." },
    { group: 8, question: "What will probably happen in two hours?", options: ["(A) An emergency vehicle will arrive.", "(B) A city bridge will be inspected.", "(C) A commuter route will reopen.", "(D) A traffic report will be updated."], answer: "(C) A commuter route will reopen.", explanation: "'another two hours before all four lanes are open'." },
    { group: 8, question: "What does the speaker imply when she says, \"This bridge has only one lane running in each direction\"?", options: ["(A) A cause of an accident is clear.", "(B) A delay should be expected.", "(C) People have complained about traffic.", "(D) Repairs must be performed."], answer: "(B) A delay should be expected.", explanation: "'You may need to leave a bit earlier' → 각 방향 1차선뿐이라 정체 예상." },
    { group: 9, question: "What will the listeners do first?", options: ["(A) Feed some birds", "(B) Buy some souvenirs", "(C) Watch a presentation", "(D) Read a pamphlet"], answer: "(C) Watch a presentation", explanation: "'The tour will begin with a presentation on the park'.", script: "Welcome to the Bellingham Wetlands Park. My name is Gerald Porter, and I'll be your guide today. The tour will begin with a presentation on the park, which will take place here at the visitor's center. Following that, we will explore the trails surrounding the visitor's center. Watch for obstacles on the path. We still haven't repaired the damage from the storm last week. At 1:30 P.M., we'll be joined by a park employee, who will accompany us to Everett Lake at the center of the park. We'll spend about 30 minutes there watching the birds that visit the park each summer." },
    { group: 9, question: "Why does the speaker say, \"We still haven't repaired the damage from the storm last week\"?", options: ["(A) To explain why access is denied", "(B) To indicate why caution is necessary", "(C) To show how a mistake was made", "(D) To describe how a task is done"], answer: "(B) To indicate why caution is necessary", explanation: "'Watch for obstacles on the path' → 주의가 필요한 이유." },
    { group: 9, question: "What will the listeners do at the center of the park?", options: ["(A) Swim in a lake", "(B) Visit an information center", "(C) Eat some snacks", "(D) Observe some animals"], answer: "(D) Observe some animals", explanation: "'watching the birds that visit the park each summer'." },
    { group: 10, question: "What did the speaker do on June 2?", options: ["(A) Placed an order", "(B) Gave a present", "(C) Visited a store", "(D) Downloaded a program"], answer: "(A) Placed an order", explanation: "'On June 2, I ordered a laptop on your Web site'.", script: "My name is Louis Park. On June 2, I ordered a laptop on your Web site. I selected your latest model, the GR150. Because I plan to give the item as a gift this weekend, I paid $20 extra for express delivery. I was very pleased with this service, as the laptop arrived in two days. However, I indicated that I wanted the version of the computer with a red keyboard. The device I received has a black keyboard. I'm wondering if another one can be sent before the end of the week." },
    { group: 10, question: "What did the speaker pay extra for?", options: ["(A) A computer accessory", "(B) Quick shipment", "(C) Some additional software", "(D) An extended warranty"], answer: "(B) Quick shipment", explanation: "'I paid $20 extra for express delivery'." },
    { group: 10, question: "Why does the speaker say, \"The device I received has a black keyboard\"?", options: ["(A) To suggest that a complaint was addressed", "(B) To explain a decision to request a refund", "(C) To indicate that the wrong item was sent", "(D) To specify an available color choice"], answer: "(C) To indicate that the wrong item was sent", explanation: "'I wanted the version... with a red keyboard' → 검은색을 받음 = 잘못된 제품 발송." },
  ] },
  { day: 18, part: "Part 4", questions: [
    { group: 1, question: "What most likely is the speaker's occupation?", options: ["(A) Event planner", "(B) Guest services associate", "(C) Travel agent", "(D) Personal secretary"], answer: "(B) Guest services associate", explanation: "화자가 'I'm in charge of booking at Alliance Resort and Spa'라며 리조트 예약 담당이라고 했으므로 고객 서비스 담당자이다.", script: "Ms. Gordon, this is Freddie Stark. I'm in charge of booking at Alliance Resort and Spa. According to your recent voice mail, you are considering staying at our resort next month. To answer your questions about entertainment, the live band performs near the pool area every Saturday and Sunday evening. As for the room you inquired about, it has amazing views and is available during your trip. Just so you know, however, that particular suite is our most expensive room. But it's well worth the cost. Feel free to call me back at 555-3304 to reserve it. [Graphic — Nightly Rate: Junior suite $225, Superior suite $285, Executive suite $325, Royal suite $375]" },
    { group: 1, question: "According to the speaker, what happens on weekend evenings?", options: ["(A) A performance is given.", "(B) A tour is organized.", "(C) A spa discount is offered.", "(D) A pool is cleaned."], answer: "(A) A performance is given.", explanation: "'the live band performs near the pool area every Saturday and Sunday evening'이라며 주말 저녁마다 라이브 공연이 있다고 했다.", script: "Ms. Gordon, this is Freddie Stark. I'm in charge of booking at Alliance Resort and Spa. ... the live band performs near the pool area every Saturday and Sunday evening. ... that particular suite is our most expensive room. ... call me back at 555-3304 to reserve it." },
    { group: 1, question: "Look at the graphic. Which room type is the listener considering?", options: ["(A) Junior suite", "(B) Superior suite", "(C) Executive suite", "(D) Royal suite"], answer: "(D) Royal suite", explanation: "화자가 그 객실이 'our most expensive room'이라고 했고, 시각자료상 가장 비싼($375) 객실은 Royal suite이다.", script: "Ms. Gordon, this is Freddie Stark. I'm in charge of booking at Alliance Resort and Spa. ... that particular suite is our most expensive room. But it's well worth the cost. [Graphic — Nightly Rate: Junior suite $225, Superior suite $285, Executive suite $325, Royal suite $375]" },
    { group: 2, question: "Look at the graphic. What does the business have a limited supply of?", options: ["(A) Pies", "(B) Cookies", "(C) Muffins", "(D) Cakes"], answer: "(D) Cakes", explanation: "'we have a limited supply of the items on the first shelf'라고 했고, 시각자료상 1st shelf는 Cakes이다.", script: "Attention, customers. All baked goods in our display case are 30 percent off today! Please note that we have a limited supply of the items on the first shelf, so you should hurry if you are interested in those. We are holding this special sale in honor of Sweet Treat's second anniversary. Additionally, anyone who makes a purchase today will get a free plate with our bakery's name and logo. The cashier will provide you with one at the counter. Thank you. [Graphic — display shelves top→bottom: 4th Pies, 3rd Cookies, 2nd Muffins, 1st Cakes]" },
    { group: 2, question: "Why is a sale being held?", options: ["(A) To honor a holiday", "(B) To celebrate an anniversary", "(C) To promote a partnership", "(D) To launch a new product"], answer: "(B) To celebrate an anniversary", explanation: "'We are holding this special sale in honor of Sweet Treat's second anniversary'라며 2주년 기념 세일이라고 했다.", script: "Attention, customers. All baked goods in our display case are 30 percent off today! ... We are holding this special sale in honor of Sweet Treat's second anniversary. ... anyone who makes a purchase today will get a free plate ..." },
    { group: 2, question: "What is provided with each purchase?", options: ["(A) A publication", "(B) A dish", "(C) A coupon", "(D) A poster"], answer: "(B) A dish", explanation: "'anyone who makes a purchase today will get a free plate'라며 구매 시 무료 접시를 준다고 했다. plate → a dish.", script: "Attention, customers. ... anyone who makes a purchase today will get a free plate with our bakery's name and logo. The cashier will provide you with one at the counter. Thank you." },
    { group: 3, question: "Why does the speaker thank the research team?", options: ["(A) It developed a manufacturing process.", "(B) It created a training program.", "(C) It conducted a customer survey.", "(D) It improved a product line."], answer: "(D) It improved a product line.", explanation: "'the research team that redeveloped our line of eye shadows to include a wider range of colors'라며 제품군을 개선한 연구팀에 감사했다.", script: "Good morning, everyone. ... our Magic cosmetics line has experienced a stunning 10 percent growth in sales since January. ... I'd like to thank the research team that redeveloped our line of eye shadows to include a wider range of colors. ... What boosted our sales was positive reviews by beauty bloggers ... we're moving up the release date of our new mascara to this summer, in the month that we've traditionally had the most significant decline in sales. [Graphic — Previous Summer's Sales bar graph Jun–Sep, lowest = Aug]" },
    { group: 3, question: "According to the speaker, what caused sales to increase?", options: ["(A) A sales event", "(B) Online feedback", "(C) A magazine article", "(D) Television advertising"], answer: "(B) Online feedback", explanation: "'What boosted our sales was positive reviews by beauty bloggers'라며 뷰티 블로거들의 후기가 매출을 늘렸다고 했다. → online feedback.", script: "Good morning, everyone. ... What is most remarkable is that we did no documentation marketing for this line. What boosted our sales was positive reviews by beauty bloggers that brought attention to the product. ..." },
    { group: 3, question: "Look at the graphic. When will the new mascara be released?", options: ["(A) In June", "(B) In July", "(C) In August", "(D) In September"], answer: "(C) In August", explanation: "신제품을 'the month that we've traditionally had the most significant decline in sales'에 출시한다고 했고, 그래프상 판매가 가장 낮은 달은 August이다.", script: "... we're moving up the release date of our new mascara to this summer, in the month that we've traditionally had the most significant decline in sales. [Graphic — Previous Summer's Sales bar graph Jun–Sep, lowest = Aug]" },
    { group: 4, question: "Look at the graphic. Which country is TTG currently on tour in?", options: ["(A) China", "(B) Japan", "(C) South Korea", "(D) Indonesia"], answer: "(A) China", explanation: "'The group is currently on tour in the largest music market in the region'이라고 했고, 원그래프상 가장 큰 시장(34%)은 China이다.", script: "As you all know, the pop band TTG is extremely popular throughout Asia. The group is currently on tour in the largest music market in the region. This week, our record label is going to broadcast a series of advertisements for the first time to promote the tour. ... five or six days from now, we'll be releasing the band's newest single. I'll play it for you now. [Graphic — Asian Music Markets pie: China 34%, Japan 29%, South Korea, Indonesia]" },
    { group: 4, question: "What does the speaker say the company will do this week?", options: ["(A) Launch some commercials", "(B) Hire a new band manager", "(C) Sponsor a charity concert", "(D) Acquire tickets for employees"], answer: "(A) Launch some commercials", explanation: "'This week, our record label is going to broadcast a series of advertisements'라며 이번 주에 광고를 내보낸다고 했다.", script: "As you all know, the pop band TTG is extremely popular throughout Asia. ... This week, our record label is going to broadcast a series of advertisements for the first time to promote the tour. We expect this to considerably increase ticket sales. ..." },
    { group: 4, question: "What will listeners probably do next?", options: ["(A) Read a handout", "(B) Share some ideas", "(C) Listen to a song", "(D) Split up into groups"], answer: "(C) Listen to a song", explanation: "'we'll be releasing the band's newest single. I'll play it for you now'라며 신곡을 틀어주겠다고 했으므로 노래를 들을 것이다.", script: "... Finally, five or six days from now, we'll be releasing the band's newest single. I'll play it for you now." },
    { group: 5, question: "Why is the speaker calling?", options: ["(A) To confirm a delivery destination", "(B) To answer questions about shipping", "(C) To cancel a pickup service", "(D) To explain a policy change"], answer: "(B) To answer questions about shipping", explanation: "'I'm returning your call about sending a box of documents'라며 배송 관련 질문에 답하려고 전화했다.", script: "This is Leonard Freeman from Courier Express. I'm returning your call about sending a box of documents from Toronto to Philadelphia. You asked whether we could collect the container on Saturday morning. A weekend pickup is possible, but you'll have to pay an extra charge of $19. ... Seeing as you requested that the box arrive in the afternoon on the same day, there's only one option available to you. ... [Graphic — Shipping Time: Standard 3 days, Express 2 days, Priority Next Day, Priority PLUS Same day]" },
    { group: 5, question: "What should the listener do to receive a weekend pickup?", options: ["(A) Submit a request online", "(B) Call a counter directly", "(C) Pay an additional fee", "(D) Visit a downtown office"], answer: "(C) Pay an additional fee", explanation: "'A weekend pickup is possible, but you'll have to pay an extra charge of $19'라며 추가 요금을 내야 한다고 했다.", script: "This is Leonard Freeman from Courier Express. ... You asked whether we could collect the container on Saturday morning. A weekend pickup is possible, but you'll have to pay an extra charge of $19. ..." },
    { group: 5, question: "Look at the graphic. Which service will the listener most likely use?", options: ["(A) Standard", "(B) Express", "(C) Priority", "(D) Priority Plus"], answer: "(D) Priority Plus", explanation: "'box arrive in the afternoon on the same day'라고 했고, 시각자료상 Same Day 배송은 Priority PLUS이다.", script: "This is Leonard Freeman from Courier Express. ... Seeing as you requested that the box arrive in the afternoon on the same day, there's only one option available to you. [Graphic — Shipping Time: Standard 3 days, Express 2 days, Priority Next Day, Priority PLUS Same day]" },
    { group: 6, question: "Who most likely are the listeners?", options: ["(A) Emergency crews", "(B) Maintenance workers", "(C) Airline passengers", "(D) Ticketing agents"], answer: "(C) Airline passengers", explanation: "'This announcement is for travelers taking Flight 309 to Mumbai'라며 항공편 탑승객을 대상으로 한 안내방송이다.", script: "This announcement is for travelers taking Flight 309 to Mumbai, India. There has been an unexpected change to your itinerary. At the moment, the boarding bridge at your original gate is experiencing a mechanical malfunction. ... passengers of Flight 309 have been assigned a new departure gate. It is located right next to the lounge. We appreciate your understanding. [Graphic — gate map: Lounge next to Gate 22]" },
    { group: 6, question: "What problem does the speaker mention?", options: ["(A) A service is unavailable.", "(B) A flight has been delayed.", "(C) A machine has malfunctioned.", "(D) A lounge is inaccessible."], answer: "(C) A machine has malfunctioned.", explanation: "'the boarding bridge at your original gate is experiencing a mechanical malfunction'이라며 기계 고장을 언급했다.", script: "This announcement is for travelers taking Flight 309 to Mumbai, India. ... the boarding bridge at your original gate is experiencing a mechanical malfunction. We apologize for this. ..." },
    { group: 6, question: "Look at the graphic. What will be the gate for Flight 309?", options: ["(A) Gate 21", "(B) Gate 22", "(C) Gate 23", "(D) Gate 24"], answer: "(B) Gate 22", explanation: "새 탑승구가 'located right next to the lounge'라고 했고, 시각자료상 Lounge 바로 옆은 Gate 22이다.", script: "This announcement is for travelers taking Flight 309 to Mumbai, India. ... passengers of Flight 309 have been assigned a new departure gate. It is located right next to the lounge. [Graphic — gate map: Lounge next to Gate 22]" },
    { group: 7, question: "Where does the speaker most likely work?", options: ["(A) At a financial services firm", "(B) At a marketing company", "(C) At a real estate agency", "(D) At a law office"], answer: "(C) At a real estate agency", explanation: "'our agents sold 30 percent more residential properties this year'라며 부동산 중개 업무를 언급했다.", script: "As I'm sure most of you know, our business has been doing very well lately. In fact, our agents sold 30 percent more residential properties this year than last year. As a result, we will be relocating to a larger office next month. ... It's on Ridge Street, just across the street from the Plaza Subway Station. ... The new building has a fitness center on the main floor. If any of our staff members decide to join it, the company will pay the membership fees. ... [Graphic — building map: Ridge St. across from Plaza Subway Station = Building C]" },
    { group: 7, question: "Look at the graphic. Which building will the business relocate to?", options: ["(A) Building A", "(B) Building B", "(C) Building C", "(D) Building D"], answer: "(C) Building C", explanation: "새 건물이 'on Ridge Street, just across the street from the Plaza Subway Station'이라고 했고, 지도상 해당 위치는 Building C이다.", script: "As I'm sure most of you know, our business has been doing very well lately. ... It's on Ridge Street, just across the street from the Plaza Subway Station. [Graphic — building map: Ridge St. across from Plaza Subway Station = Building C]" },
    { group: 7, question: "What benefit will be offered to staff members?", options: ["(A) Gym memberships", "(B) Health insurance", "(C) Annual bonuses", "(D) Vacation leave"], answer: "(A) Gym memberships", explanation: "'The new building has a fitness center... the company will pay the membership fees'라며 헬스장 회원권을 지원한다고 했다.", script: "... The new building has a fitness center on the main floor. If any of our staff members decide to join it, the company will pay the membership fees. This benefit is being offered as a reward for all your hard work." },
    { group: 8, question: "Where is the talk most likely taking place?", options: ["(A) In an electronics store", "(B) In a meeting room", "(C) In a break room", "(D) In a manufacturing plant"], answer: "(B) In a meeting room", explanation: "'One last thing I'd like to discuss before we wrap up the meeting today'라며 회의를 마무리한다고 했으므로 회의실이다.", script: "One last thing I'd like to discuss before we wrap up the meeting today. We have to replace our graphic design team's computer monitors. This needs to be done soon because the team has a major project starting early next month. The graphic designers will need a wireless model. ... she said that they require 28-inch monitors. ... I'll contact some suppliers later today. [Graphic — monitor table: Konon SD7 wired 26\", Pace XL wireless 26\", Modo 400S wired 28\", Vision CD wireless 28\"]" },
    { group: 8, question: "What does the speaker say about the graphic design team?", options: ["(A) It will test a variety of devices.", "(B) It will get a new supervisor.", "(C) It will begin an important project.", "(D) It will move to another office."], answer: "(C) It will begin an important project.", explanation: "'the team has a major project starting early next month'이라며 다음 달 초 중요한 프로젝트를 시작한다고 했다.", script: "One last thing I'd like to discuss before we wrap up the meeting today. We have to replace our graphic design team's computer monitors. This needs to be done soon because the team has a major project starting early next month. ..." },
    { group: 8, question: "Look at the graphic. Which device will the speaker probably order?", options: ["(A) Konon SD7", "(B) Pace XL", "(C) Modo 400S", "(D) Vision CD"], answer: "(D) Vision CD", explanation: "무선(wireless) 모델이면서 28인치가 필요하다고 했고, 표에서 무선이며 28인치인 것은 Vision CD뿐이다.", script: "... The graphic designers will need a wireless model. And ... they require 28-inch monitors. When I looked online, there is only one model that is suitable. [Graphic — Konon SD7 wired 26\", Pace XL wireless 26\", Modo 400S wired 28\", Vision CD wireless 28\"]" },
    { group: 9, question: "What type of product is the Grundy A329?", options: ["(A) A bookshelf", "(B) A desk", "(C) A bench", "(D) A chair"], answer: "(D) A chair", explanation: "'a new chair for my workspace—the Grundy A329'라며 의자라고 했다.", script: "Kendra, this is Chris Brown from the sales department. ... I want to put in a request for a new chair for my workspace—the Grundy A329, which is manufactured by Benway Incorporated. The product costs $220, but I've got a coupon for Office Warehouse ... I'd recommend having your assistant come to my office to pick it up before you make the purchase. Thanks! [Graphic — Office Warehouse coupons: $10 off over $100, $20 off over $200, $30 off over $300, $40 off over $400]" },
    { group: 9, question: "Look at the graphic. How much of a discount will be received?", options: ["(A) $10", "(B) $20", "(C) $30", "(D) $40"], answer: "(B) $20", explanation: "제품이 'costs $220'이고, 쿠폰표상 $200 초과 구매 시 $20 할인에 해당한다.", script: "... the Grundy A329 ... The product costs $220, but I've got a coupon for Office Warehouse ... [Graphic — coupons: $10 off over $100, $20 off over $200, $30 off over $300, $40 off over $400]" },
    { group: 9, question: "What does the speaker suggest?", options: ["(A) Looking up some product reviews online", "(B) Downloading a coupon from a Web site", "(C) Sending an employee to an office", "(D) Going to a retail outlet in person"], answer: "(C) Sending an employee to an office", explanation: "'I'd recommend having your assistant come to my office to pick it up'이라며 직원(보조)을 사무실로 보내라고 제안했다.", script: "Kendra, this is Chris Brown from the sales department. ... I'd recommend having your assistant come to my office to pick it up before you make the purchase. Thanks!" },
    { group: 10, question: "What does the speaker ask the listeners to do?", options: ["(A) Check a document", "(B) Move to another classroom", "(C) Write down information", "(D) Update a schedule"], answer: "(A) Check a document", explanation: "'please check the updated schedule that I handed out'이라며 나눠준 시간표(문서)를 확인하라고 했다.", script: "Welcome to this employee marketing workshop hosted by the Corporate Training Institute. ... First, please check the updated schedule that I handed out. You'll see that today's workshop sessions have all been moved to different classrooms on the second floor. ... we've replaced the wallpaper and flooring in the rooms on the first floor last week ... there will be a Q&A session at the end of the day. It will be held in the same room as the second workshop. ... [Graphic — Updated Schedule: Social Networking 9AM Rm202, Interactive Media 11AM Rm203, Digital Trends 1PM Rm204, Mobile Apps 3PM Rm205]" },
    { group: 10, question: "What did the Corporate Training Institute recently do?", options: ["(A) It moved to a new location.", "(B) It hired additional instructors.", "(C) It renovated some classrooms.", "(D) It launched a Web site."], answer: "(C) It renovated some classrooms.", explanation: "'we've replaced the wallpaper and flooring in the rooms on the first floor last week'이라며 교실을 개보수했다고 했다.", script: "Welcome to this employee marketing workshop ... we've replaced the wallpaper and flooring in the rooms on the first floor last week and haven't had time to set up the furniture and equipment. ..." },
    { group: 10, question: "Look at the graphic. Where will the Q&A session be held?", options: ["(A) Room 202", "(B) Room 203", "(C) Room 204", "(D) Room 205"], answer: "(B) Room 203", explanation: "Q&A가 'held in the same room as the second workshop'이라고 했고, 시간표상 두 번째 워크숍(Interactive Media)은 Room 203이다.", script: "... there will be a Q&A session at the end of the day. It will be held in the same room as the second workshop. [Graphic — Updated Schedule: Social Networking 9AM Rm202, Interactive Media 11AM Rm203, Digital Trends 1PM Rm204, Mobile Apps 3PM Rm205]" },

  { day: 19, part: "Part 4", questions: [
    { group: 1, question: "Why is the speaker calling?", options: ["(A) To explain a project deadline", "(B) To request a day off", "(C) To get information from a colleague", "(D) To share details about a past event"], answer: "(C) To get information from a colleague", explanation: "'I'm calling to find out who among your team is interested in joining'.", script: "Hi, Mia. It's Colin Stiller. As you know, the human resources department is planning to have an outing during the second week of August: a picnic at Drew Beach. I'm calling to find out who among your team is interested in joining. Once I know the number of attendees, I'll book the necessary transportation—probably some shuttle buses. It'd be great if you could inform me by this afternoon. Just note that you'll have to contact me on my cell phone. The newly installed telephone in my office isn't working for some reason." },
    { group: 1, question: "What does the speaker need to do?", options: ["(A) Exchange some bus passes", "(B) Sign up for a company gathering", "(C) Select a destination", "(D) Make some arrangements"], answer: "(D) Make some arrangements", explanation: "'I'll book the necessary transportation' = arrangements." },
    { group: 1, question: "What is mentioned about the office phone?", options: ["(A) It was recently set up.", "(B) It has a new extension.", "(C) It will be fixed soon.", "(D) It was reconnected."], answer: "(A) It was recently set up.", explanation: "'The newly installed telephone in my office'. newly installed = recently set up." },
    { group: 2, question: "What is being advertised?", options: ["(A) A career exposition", "(B) A sports festival", "(C) An internship program", "(D) A business conference"], answer: "(A) A career exposition", explanation: "'The annual Rockefeller Job Fair'. job fair → career exposition.", script: "If you're a graduate looking for a new job and are tired of browsing through frustrating classified ads, well worry no more! The annual Rockefeller Job Fair will be held this Saturday at the Renault Stadium from 8 A.M. to 5 P.M. Some of the country's top employers will be there to accept applications and conduct on-site interviews. College graduates and professionals seeking careers in information technology, engineering, architecture, sales, advertising, and other industries should attend. Don't forget to bring copies of your résumé and references. For more information, please visit www.rockefellerjobs.com or call us at 555-3322." },
    { group: 2, question: "What will take place at the event?", options: ["(A) Training will be provided.", "(B) Interviews will be conducted.", "(C) Presentations will be given.", "(D) Competitions will be held."], answer: "(B) Interviews will be conducted.", explanation: "'conduct on-site interviews'." },
    { group: 2, question: "What are listeners asked to bring?", options: ["(A) Business cards", "(B) Copies of documents", "(C) Employment certificates", "(D) Work samples"], answer: "(B) Copies of documents", explanation: "'bring copies of your résumé and references'." },
    { group: 3, question: "What type of business does the speaker work for?", options: ["(A) A delivery firm", "(B) A finance consulting business", "(C) A catering service", "(D) A manufacturing company"], answer: "(D) A manufacturing company", explanation: "'calling from Sullivan Manufacturing'.", script: "Hello, Mr. Quinn. This is Diane Scott calling from Sullivan Manufacturing. I'm calling because I need some price quotes for some raw materials as we are planning to increase production. We need the items as soon as possible, so I'll send you a list of our requirements today. We are confident that you will supply us with quality materials, just as you have done in the past. If you have questions regarding our request, please call me at 555-1002 extension 19. Thanks." },
