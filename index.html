============================================================
 Supabase 테이블 생성 SQL (Supabase 대시보드 → SQL Editor 에서 실행)
============================================================

-- 단어 오답
create table if not exists wrong_words (
  id uuid primary key default gen_random_uuid(),
  word text,
  meaning text,
  example text,
  wrong_count int default 1,
  last_wrong_at timestamptz default now(),
  created_at timestamptz default now()
);

-- RC 오답
create table if not exists wrong_rc (
  id uuid primary key default gen_random_uuid(),
  chapter text,
  question text,
  correct_answer text,
  user_answer text,
  wrong_count int default 1,
  last_wrong_at timestamptz default now(),
  created_at timestamptz default now()
);

-- LC 오답
create table if not exists wrong_lc (
  id uuid primary key default gen_random_uuid(),
  part text,
  file_name text,
  question text,
  correct_answer text,
  user_answer text,
  wrong_count int default 1,
  last_wrong_at timestamptz default now(),
  created_at timestamptz default now()
);

-- 익명(publishable key) 접근 허용 RLS 정책 (학습용)
-- ★ 오답 "저장"이 동작하려면 INSERT/UPDATE/DELETE 정책이 반드시 있어야 합니다.
--   (SELECT 정책만 있으면 조회는 되지만 저장 시 42501 RLS 오류가 납니다.)
alter table wrong_words enable row level security;
alter table wrong_rc enable row level security;
alter table wrong_lc enable row level security;

-- 단어
create policy "ww_select" on wrong_words for select using (true);
create policy "ww_insert" on wrong_words for insert with check (true);
create policy "ww_update" on wrong_words for update using (true) with check (true);
create policy "ww_delete" on wrong_words for delete using (true);
-- RC
create policy "wrc_select" on wrong_rc for select using (true);
create policy "wrc_insert" on wrong_rc for insert with check (true);
create policy "wrc_update" on wrong_rc for update using (true) with check (true);
create policy "wrc_delete" on wrong_rc for delete using (true);
-- LC
create policy "wlc_select" on wrong_lc for select using (true);
create policy "wlc_insert" on wrong_lc for insert with check (true);
create policy "wlc_update" on wrong_lc for update using (true) with check (true);
create policy "wlc_delete" on wrong_lc for delete using (true);
============================================================

    { question: "I thought you attended the medical convention.", options: ["(A) He's in charge of collections.", "(B) She prescribed some medicine.", "(C) No, I had an emergency that day."], answer: "(C) No, I had an emergency that day.", explanation: "평서문. 그날 응급 상황이 있었다는 말로 참석하지 못한 이유를 설명한 정답. (A)는 convention-collections 유사 발음, (B)는 medical-medicine 유사 발음 오답.", script: "I thought you attended the medical convention. / (A) He's in charge of collections. / (B) She prescribed some medicine. / (C) No, I had an emergency that day." },
    { question: "The committee submitted its latest expense report, didn't it?", options: ["(A) Thanks, but we just ate.", "(B) They handed it in this morning.", "(C) Yes, the accountant started last Monday."], answer: "(B) They handed it in this morning.", explanation: "부가 의문문. 오늘 아침에 제출했다는 말로 긍정 답변한 정답. (A)는 latest-just 유사 발음, (C)는 report 연상 accountant로 혼동을 준 오답.", script: "The committee submitted its latest expense report, didn't it? / (A) Thanks, but we just ate. / (B) They handed it in this morning. / (C) Yes, the accountant started last Monday." },
    { question: "Do you want some more cake?", options: ["(A) Yes, I want to meet him.", "(B) No, thank you. I'm full.", "(C) Someone will do it."], answer: "(B) No, thank you. I'm full.", explanation: "제안 의문문. 배가 부르다는 말로 거절한 정답. (A)는 want 반복, (C)는 관련 없는 응답 오답.", script: "Do you want some more cake? / (A) Yes, I want to meet him. / (B) No, thank you. I'm full. / (C) Someone will do it." },
    { question: "The employee orientation will take place on Thursday, won't it?", options: ["(A) It requires good communication skills.", "(B) Yes, the staff as well.", "(C) That's what the secretary said."], answer: "(C) That's what the secretary said.", explanation: "부가 의문문. 비서가 그렇게 말했다는 말로 간접 확인한 정답. (A)(B)는 employee 연상 어휘 오답.", script: "The employee orientation will take place on Thursday, won't it? / (A) It requires good communication skills. / (B) Yes, the staff as well. / (C) That's what the secretary said." },
    { question: "This building was renovated last year, wasn't it?", options: ["(A) I'm not really sure.", "(B) It's an innovative design.", "(C) I saw the floor plan."], answer: "(A) I'm not really sure.", explanation: "부가 의문문. 잘 모르겠다는 말로 응답한 정답. (B)는 renovated-innovative 유사 발음, (C)는 building 연상 floor plan으로 혼동을 준 오답.", script: "This building was renovated last year, wasn't it? / (A) I'm not really sure. / (B) It's an innovative design. / (C) I saw the floor plan." },
    { question: "You should pick up the business suits you ordered on Friday.", options: ["(A) These are suitable for work.", "(B) OK, I'll drop by your store then.", "(C) Everything is in order."], answer: "(B) OK, I'll drop by your store then.", explanation: "평서문. OK로 수락 후 가게에 들르겠다는 부연 설명을 한 정답. (A)는 suits-suitable 유사 발음, (C)는 ordered를 'order(정돈)'로 혼동을 준 오답.", script: "You should pick up the business suits you ordered on Friday. / (A) These are suitable for work. / (B) OK, I'll drop by your store then. / (C) Everything is in order." },
    { question: "This bag comes in three sizes.", options: ["(A) Can I see the smallest one?", "(B) It's full of clothes.", "(C) She arrived early for work."], answer: "(A) Can I see the smallest one?", explanation: "평서문. 가장 작은 것을 볼 수 있는지 되물은 정답. (B)(C)는 무관하거나 연상 어휘로 혼동을 준 오답.", script: "This bag comes in three sizes. / (A) Can I see the smallest one? / (B) It's full of clothes. / (C) She arrived early for work." },
    { question: "You like to read fantasy books, don't you?", options: ["(A) Yes, whenever I have time.", "(B) I think it's a good book store.", "(C) No, she's in a meeting."], answer: "(A) Yes, whenever I have time.", explanation: "부가 의문문. Yes로 긍정하고 시간 날 때마다 읽는다는 부연 설명을 한 정답. (B)는 books-book store 반복, (C)는 무관한 응답 오답.", script: "You like to read fantasy books, don't you? / (A) Yes, whenever I have time. / (B) I think it's a good book store. / (C) No, she's in a meeting." },
    { question: "Tom did a great job setting up the showroom.", options: ["(A) I have a show tonight.", "(B) I completely agree.", "(C) There's no more room."], answer: "(B) I completely agree.", explanation: "평서문. 전적으로 동의한다는 말로 의견을 제시한 정답. (A)는 showroom-show, (C)는 showroom-room 유사 발음 오답.", script: "Tom did a great job setting up the showroom. / (A) I have a show tonight. / (B) I completely agree. / (C) There's no more room." },
    { question: "Can you take a look at this invoice for a moment?", options: ["(A) I can't access my voice mail.", "(B) It looks rather tall.", "(C) As soon as I wrap up this call."], answer: "(C) As soon as I wrap up this call.", explanation: "요청 의문문. 전화를 마무리 짓고 나서 보겠다는 정답. (A)는 invoice-voice 유사 발음, (B)는 look을 looks로 사용한 혼동 오답.", script: "Can you take a look at this invoice for a moment? / (A) I can't access my voice mail. / (B) It looks rather tall. / (C) As soon as I wrap up this call." },
    { question: "I won't be able to meet you on Monday because of a business trip.", options: ["(A) We can reschedule our appointment.", "(B) Vancouver is an expensive place to live.", "(C) What time was your flight?"], answer: "(A) We can reschedule our appointment.", explanation: "평서문. 약속을 변경할 수 있다는 해결책을 제시한 정답. (B)(C)는 business trip 연상 어휘로 혼동을 준 오답.", script: "I won't be able to meet you on Monday because of a business trip. / (A) We can reschedule our appointment. / (B) Vancouver is an expensive place to live. / (C) What time was your flight?" },
    { question: "Why don't you take the ferry?", options: ["(A) It doesn't start running for another hour.", "(B) On the river.", "(C) At a fair price."], answer: "(A) It doesn't start running for another hour.", explanation: "제안 의문문. 한 시간 뒤에야 운행을 시작한다며 제안을 간접 거절한 정답. (B)는 ferry 연상 river, (C)는 ferry-fair 유사 발음 오답.", script: "Why don't you take the ferry? / (A) It doesn't start running for another hour. / (B) On the river. / (C) At a fair price." },
    { question: "If you need a copy of the report, please take one from my desk.", options: ["(A) I'll take coffee, please.", "(B) Yes, she's clearing it.", "(C) Thanks, I'll do that."], answer: "(C) Thanks, I'll do that.", explanation: "평서문(제안). 고맙다며 그렇게 하겠다고 수락한 정답. (A)는 take 반복 및 copy-coffee 유사 발음, (B)는 무관한 응답 오답.", script: "If you need a copy of the report, please take one from my desk. / (A) I'll take coffee, please. / (B) Yes, she's clearing it. / (C) Thanks, I'll do that." },
    { question: "Could you prepare the program for tomorrow's banquet?", options: ["(A) The master of ceremonies.", "(B) No, it's very hard to repair.", "(C) OK. I'll work on it right away."], answer: "(C) OK. I'll work on it right away.", explanation: "요청 의문문. OK로 수락하고 바로 하겠다고 답한 정답. (A)는 banquet 연상 master of ceremonies, (B)는 prepare-repair 유사 발음 오답.", script: "Could you prepare the program for tomorrow's banquet? / (A) The master of ceremonies. / (B) No, it's very hard to repair. / (C) OK. I'll work on it right away." },
    { question: "The printer manual is not easy to understand, is it?", options: ["(A) Try looking under the stand.", "(B) No, it's difficult.", "(C) The office needs some new printers."], answer: "(B) No, it's difficult.", explanation: "부가 의문문. No로 이해하기 쉽지 않음을 전달하고 어렵다는 의견을 더한 정답. (A)는 understand-under the stand 유사 발음, (C)는 printer를 printers로 반복한 오답.", script: "The printer manual is not easy to understand, is it? / (A) Try looking under the stand. / (B) No, it's difficult. / (C) The office needs some new printers." },
    { question: "Do you want to come with us to the concert?", options: ["(A) He's coming from the airport.", "(B) Let me check if I'm free.", "(C) I really enjoyed it."], answer: "(B) Let me check if I'm free.", explanation: "제안 의문문. 다른 약속이 없는지 확인해보겠다는 정답. (A)는 come-coming 유사 발음, (C)는 concert 연상 응답 오답.", script: "Do you want to come with us to the concert? / (A) He's coming from the airport. / (B) Let me check if I'm free. / (C) I really enjoyed it." },
    { question: "Why don't we drop by the city library quickly?", options: ["(A) No, let's go another day.", "(B) I already dropped it off.", "(C) You shouldn't buy it."], answer: "(A) No, let's go another day.", explanation: "제안 의문문. No로 거절하고 다른 날 가자고 제안한 정답. (B)는 drop by-drop off 혼동, (C)는 library에서 연상되는 buy로 혼동을 준 오답.", script: "Why don't we drop by the city library quickly? / (A) No, let's go another day. / (B) I already dropped it off. / (C) You shouldn't buy it." },
  ] },
  { day: 7, part: "Part 3", questions: [
    { group: 1, question: "Who most likely is the man?", options: ["(A) A unit owner", "(B) A driving instructor", "(C) A sales agent", "(D) A building employee"], answer: "(D) A building employee", explanation: "'Building administration office, this is Ivan'.", script: "M: Building administration office, this is Ivan. What can I do for you? W: Hello. I just moved into Unit 28 on the 14th floor, and I was wondering how I could apply for a parking space for my car. M: I can help with that. You need to fill out an application form, which you can get from me or from another staff member. Unfortunately, the office is closed for maintenance today, so you won't be able to pick up the form until Monday." },
    { group: 1, question: "What does the woman want?", options: ["(A) Confirmation of a fee payment", "(B) Advice on purchasing a car", "(C) A brochure about apartment services", "(D) Information about obtaining a parking space"], answer: "(D) Information about obtaining a parking space", explanation: "'how I could apply for a parking space for my car'." },
    { group: 1, question: "Why is the woman unable to pick up the form today?", options: ["(A) The man is out of town.", "(B) Maintenance is being carried out.", "(C) Interviews are being conducted.", "(D) The man is busy."], answer: "(B) Maintenance is being carried out.", explanation: "'the office is closed for maintenance today'." },
    { group: 2, question: "Who most likely is the man?", options: ["(A) A property manager", "(B) An interior decorator", "(C) A furniture designer", "(D) A delivery person"], answer: "(B) An interior decorator", explanation: "'I'm really impressed with what you've done with the interior of the hotel lobby'.", script: "W: Mr. Jennings, I'm really impressed with what you've done with the interior of the hotel lobby. You incorporated all of my requests regarding colors. M: Thank you, Ms. Griffin. I'm so pleased that you're satisfied with my work. W: I do have one concern, though. The furniture will cost about $2,000 more than I expected. Is there any way we can address this issue? M: Hmm... We should try Dale Furnishings, then. That brand has very similar items to the ones I selected for about 20 percent less. Just note that their fabric tends to be a bit less durable." },
    { group: 2, question: "Why is the woman concerned?", options: ["(A) A price is high.", "(B) An area is crowded.", "(C) A package is late.", "(D) An address is incorrect."], answer: "(A) A price is high.", explanation: "'The furniture will cost about $2,000 more than I expected'." },
    { group: 2, question: "What does the man suggest?", options: ["(A) Placing an online order", "(B) Consulting an architect", "(C) Trying a different brand", "(D) Requesting a discount"], answer: "(C) Trying a different brand", explanation: "'We should try Dale Furnishings, then'." },
    { group: 3, question: "Where does the woman most likely work?", options: ["(A) At a shipping warehouse", "(B) At a bus terminal", "(C) At a sports equipment store", "(D) At a fitness center"], answer: "(C) At a sports equipment store", explanation: "'You've reached Cypress Sporting Goods'.", script: "W: You've reached Cypress Sporting Goods. This is Christina. What can I do for you today? M: Hi, my name is Luke Hamilton, and I would like to check the remaining balance on my gift card. I was planning to use it to do some shopping for tennis equipment there today. W: I'd be happy to do that, Mr. Hamilton. In order for me to pull up your account, I need your card's security code. It's the four-digit number located on the back of your card." },
    { group: 3, question: "What is the man calling about?", options: ["(A) A card balance", "(B) An account password", "(C) A delivery date", "(D) A payment process"], answer: "(A) A card balance", explanation: "'I would like to check the remaining balance on my gift card'." },
    { group: 3, question: "What information does the woman ask for?", options: ["(A) The name of a store", "(B) The amount of the purchase", "(C) A security code", "(D) A home address"], answer: "(C) A security code", explanation: "'I need your card's security code'." },
    { group: 4, question: "What is the purpose of the woman's visit?", options: ["(A) To make a purchase", "(B) To apply for a job", "(C) To request a repair", "(D) To cancel a membership"], answer: "(A) To make a purchase", explanation: "'I'm thinking of buying this smartwatch'.", script: "W: Hello. I'm thinking of buying this smartwatch, but I have a question first. M: Sure, I'm happy to help. W: My friend said that it can keep track of a user's progress towards specific fitness goals. But the problem is that I can't seem to find that feature. M: Here, let me show you. You just need to select this menu option and enter your fitness goals. W: Great. I really appreciate your help. This watch is a bit more complicated than I thought. M: There is a video posted on our Web site that includes a detailed explanation of all of the watch's settings. Why don't you check it out before you make a decision? W: Thanks. I'll do that." },
    { group: 4, question: "What did the woman learn about from her friend?", options: ["(A) A promotion period", "(B) A free gift", "(C) A product feature", "(D) A return policy"], answer: "(C) A product feature", explanation: "'My friend said that it can keep track of a user's progress towards specific fitness goals'." },
    { group: 4, question: "What does the man encourage the woman to do?", options: ["(A) Read a catalog", "(B) Ask for a refund", "(C) Attend an event", "(D) Watch a video"], answer: "(D) Watch a video", explanation: "'There is a video posted on our Web site... Why don't you check it out'." },
    { group: 5, question: "Where is the conversation probably taking place?", options: ["(A) In a government building", "(B) In a design studio", "(C) In a law office", "(D) In a real estate agency"], answer: "(C) In a law office", explanation: "'A representative from Finn Clothing called our legal firm'.", script: "M: Maria, how is the contract for the merger between Finn Clothing and Broad Apparel coming along? A representative from Finn Clothing called our legal firm to inquire about it. W: I'm having some trouble with the agreement. M: Really? What's the problem? W: A new state law regarding mergers was just passed. I don't fully understand it, so I can't finalize the contract. M: I see. Well, why don't you let me see the documentation you have on the law? Maybe I can help you interpret it." },
    { group: 5, question: "What does the woman say about the contract?", options: ["(A) It has been signed.", "(B) It is incomplete.", "(C) It has been mailed out.", "(D) It has been recently revised."], answer: "(B) It is incomplete.", explanation: "'I can't finalize the contract'." },
    { group: 5, question: "What does the man suggest?", options: ["(A) Agreeing to a deal", "(B) Copying a document", "(C) Contacting some representatives", "(D) Providing some materials"], answer: "(D) Providing some materials", explanation: "'why don't you let me see the documentation you have on the law?'." },
    { group: 6, question: "What is the conversation mainly about?", options: ["(A) Purchasing a ticket", "(B) Inquiring about a price", "(C) Filing a complaint", "(D) Making a reservation"], answer: "(D) Making a reservation", explanation: "'I would like to know if you have any rooms available on Friday'.", script: "M: Hello, my name is Rick Chang, and I would like to know if you have any rooms available on Friday. W: Let's see. Yes, we do. How long would you like to stay, Mr. Chang? M: From Friday night to Monday morning. Could you get a room on the side facing the ocean? W: Sorry, but all the seaside rooms are booked for Friday. However, I can move you to one on the seventh floor if you don't mind moving on the second day." },
    { group: 6, question: "What does the man request?", options: ["(A) A room with a sea view", "(B) A late checkout time", "(C) A vegetarian meal", "(D) A reduced rate"], answer: "(A) A room with a sea view", explanation: "'Could you get a room on the side facing the ocean?'." },
    { group: 6, question: "What does the woman offer?", options: ["(A) A complimentary meal", "(B) A room transfer", "(C) A suite on the second floor", "(D) A coupon for an upgrade"], answer: "(B) A room transfer", explanation: "'I can move you to one on the seventh floor'." },
    { group: 7, question: "What are the speakers mainly discussing?", options: ["(A) Making an appointment", "(B) Issuing a certificate", "(C) Changing a schedule", "(D) Responding to an inquiry"], answer: "(D) Responding to an inquiry", explanation: "환자 'Jenna Polson contacted our clinic with an inquiry'에 대한 응대 논의.", script: "M: Pardon me, Dr. Lee. One of your patients, Jenna Polson, contacted our clinic with an inquiry. W: What does she need? M: Apparently, she's having trouble understanding her test results. You should call her back to explain everything. W: I have to prepare for surgery this afternoon. Could you ask someone else to do this? Jake is Ms. Polson's nurse. M: I'll do that right away." },
    { group: 7, question: "What does the man say the woman should do?", options: ["(A) Contact a patient", "(B) Perform a test", "(C) Complete a form", "(D) Read a message"], answer: "(A) Contact a patient", explanation: "'You should call her back to explain everything'." },
    { group: 7, question: "Why does the woman say, \"Jake is Ms. Polson's nurse\"?", options: ["(A) He can perform a task.", "(B) He will not attend an event.", "(C) He will assist with an operation.", "(D) He cannot answer a question."], answer: "(A) He can perform a task.", explanation: "수술 준비로 바빠 다른 사람에게 부탁하며 Jake가 담당 간호사임을 언급 → Jake가 그 일을 할 수 있음을 암시." },
    { group: 8, question: "What is the conversation mainly about?", options: ["(A) A project delay", "(B) A report error", "(C) An unsatisfied customer", "(D) A company evaluation"], answer: "(A) A project delay", explanation: "'We aren't going to be done with it by Friday' + 'The deadline will have to be pushed back'.", script: "W: We still have a lot of work to do on the Compton Project. We aren't going to be done with it by Friday. M1: You're right. The deadline will have to be pushed back. M2: Even if the deadline is extended by a few days, I doubt we'll finish on time. We've got to analyze and write a report on over 300 customer surveys. M1: Yeah, that's going to take a while. W: Well, what should we do, then? M1: In my opinion, we need another person on our team. M2: I agree. We've been overloaded with assignments throughout this project. W: OK. I'll ask our supervisor if someone else from our department can give us a hand. (3인 대화 M1/M2/W)" },
    { group: 8, question: "What must the men do?", options: ["(A) Prepare for a conference", "(B) Cancel a team meeting", "(C) Revise an employee manual", "(D) Review some questionnaires"], answer: "(D) Review some questionnaires", explanation: "'analyze and write a report on over 300 customer surveys'. surveys → questionnaires." },
    { group: 8, question: "What will the woman most likely do next?", options: ["(A) Organize a workshop", "(B) Speak with a manager", "(C) Assign a task", "(D) Meet with a client"], answer: "(B) Speak with a manager", explanation: "'I'll ask our supervisor if someone else... can give us a hand'." },
    { group: 9, question: "What industry do the speakers most likely work in?", options: ["(A) Software", "(B) Electronics", "(C) Publishing", "(D) Finance"], answer: "(D) Finance", explanation: "'this user graph about our bank's mobile application'. bank → Finance.", script: "M: Have you seen this user graph about our bank's mobile application? W: Not yet. Can I look at it with you on your computer? M: Sure. It shows that there was a sharp increase in new users only one month after we updated our GoBanking application. W: You're right. It seems our customers appreciated the new version's added features. M: Yes. We received a lot of positive feedback about our new payment feature. I have a report with data about customer comments too. W: Really? We should share that document with our team at the staff meeting this afternoon. They'll be interested to see it. [Graphic — New Users line graph: sharp increase in July]" },
    { group: 9, question: "Look at the graphic. When was the application upgraded?", options: ["(A) In June", "(B) In July", "(C) In August", "(D) In September"], answer: "(A) In June", explanation: "'a sharp increase in new users only one month after we updated' → 그래프상 급증은 7월이므로 그 한 달 전인 6월에 업데이트." },
    { group: 9, question: "What does the woman suggest?", options: ["(A) Collecting additional data", "(B) Rescheduling a staff meeting", "(C) Sharing a report with colleagues", "(D) Fixing application errors"], answer: "(C) Sharing a report with colleagues", explanation: "'We should share that document with our team at the staff meeting'." },
    { group: 10, question: "What are the speakers mainly discussing?", options: ["(A) A research project", "(B) A training session", "(C) A new recruiter", "(D) A hiring decision"], answer: "(D) A hiring decision", explanation: "'Have you decided whom you want to recruit for our lead researcher position?'.", script: "W: Good morning, Mitchell. Have you decided whom you want to recruit for our lead researcher position? M: I'm still considering a few people. There are multiple qualified applicants. Here, this list shows everyone's work history. W: Hmm... I think you should choose an applicant who has at least five years of experience. M: In that case, I don't have much of a choice. Ms. Bloom lacks a master's degree, which is a requirement for the job. So, that leaves me with only one option. I'll e-mail that applicant a job offer tomorrow. [Graphic — Work history (years): Dan Blather 4, Cynthia Bloom 9, Jie Xing 6, Maria Garcia 3]" },
    { group: 10, question: "What does the woman recommend?", options: ["(A) Assembling a team for an assignment", "(B) Holding a second group interview", "(C) Requiring a certain amount of experience", "(D) Getting feedback from a department head"], answer: "(C) Requiring a certain amount of experience", explanation: "'you should choose an applicant who has at least five years of experience'." },
    { group: 10, question: "Look at the graphic. Who will the man send an e-mail to tomorrow?", options: ["(A) Dan Blather", "(B) Cynthia Bloom", "(C) Jie Xing", "(D) Maria Garcia"], answer: "(C) Jie Xing", explanation: "최소 5년 경력(Bloom 9년, Xing 6년) 중 Bloom은 석사 학위가 없어 제외 → Jie Xing(6년)." },
  ] },
  { day: 8, part: "Part 3", questions: [
    { group: 1, question: "According to the speakers, who will be in training next week?", options: ["(A) New employees", "(B) The personnel department", "(C) Project leaders", "(D) The research team"], answer: "(A) New employees", explanation: "'the training for the new graphic artists'. new graphic artists = 신입 사원.", script: "W: Henry, do you know when the training for the new graphic artists will start next week? I'm supposed to prepare a presentation on our current research projects for it. I need to adjust my schedule to make time for the assignment. M: I think it will take place on Monday morning, but I'm not sure exactly when. Why don't you ask the coordinator about it? W: I'll do that. Actually, could you give me his extension number? I can't remember what it is." },
    { group: 1, question: "What does the man suggest?", options: ["(A) Completing the training materials", "(B) Consulting with the coordinator", "(C) Making a presentation", "(D) Reviewing a document"], answer: "(B) Consulting with the coordinator", explanation: "'Why don't you ask the coordinator about it?'." },
    { group: 1, question: "What does the woman ask the man to do?", options: ["(A) Give her a number", "(B) Attend an upcoming seminar", "(C) Submit a report", "(D) Accompany her to a meeting"], answer: "(A) Give her a number", explanation: "'could you give me his extension number?'." },
    { group: 2, question: "Where do the speakers most likely work?", options: ["(A) At a gallery", "(B) At a community center", "(C) At an auction house", "(D) At a university"], answer: "(A) At a gallery", explanation: "'displayed in the east wing of our gallery'.", script: "M: We just received this statue from a sculptor, and it's going to be displayed in the east wing of our gallery. However, I can't carry it on my own. W: Sure, I'll help. Uh, this piece is very beautiful. Who made it? M: Ken Waters, a renowned art professor at Burkett College. There are several Web sites that feature photographs of his works. You should find them and take a look. W: I'll definitely do that. Thanks for the suggestion." },
    { group: 2, question: "What does the woman inquire about?", options: ["(A) The cost of a service", "(B) The location of a facility", "(C) The creator of an item", "(D) The date of an event"], answer: "(C) The creator of an item", explanation: "'this piece is very beautiful. Who made it?' (piece→item)." },
    { group: 2, question: "What does the man recommend?", options: ["(A) Contacting an instructor", "(B) Searching online", "(C) Providing information", "(D) Joining a tour"], answer: "(B) Searching online", explanation: "'There are several Web sites... You should find them and take a look'." },
    { group: 3, question: "What are the speakers mainly discussing?", options: ["(A) Launching a new Web site", "(B) Coming up with a strategy", "(C) Reviewing questionnaire results", "(D) Hiring additional sales staff"], answer: "(B) Coming up with a strategy", explanation: "'our department must create a new marketing strategy to increase sales'.", script: "W: Our manager said that our department must create a new marketing strategy to increase sales. M: I heard. I think it'd be a good idea for us to update our Web site so customers can make transactions online. W: I think so too. I can study some of our competitors' Web sites to see how they're designed. Then, we can compile a list of features from their sites that we might want to use. M: Hmm... That will take a lot of time. I'd prefer to conduct a short customer survey instead." },
    { group: 3, question: "What does the woman offer to do?", options: ["(A) Modify a submission", "(B) Perform an installation", "(C) Get a product list", "(D) Look at Web sites"], answer: "(D) Look at Web sites", explanation: "'I can study some of our competitors' Web sites'." },
    { group: 3, question: "What does the man want to do?", options: ["(A) Create advertisements for a service", "(B) Offer free delivery for some products", "(C) Gather feedback from customers", "(D) Conduct employee evaluations"], answer: "(C) Gather feedback from customers", explanation: "'I'd prefer to conduct a short customer survey instead'." },
    { group: 4, question: "Why is the man calling?", options: ["(A) To invite the woman to a performance", "(B) To give the woman directions", "(C) To talk to the woman about a presentation", "(D) To inform the woman about a project"], answer: "(A) To invite the woman to a performance", explanation: "'The first showing of the play... Why don't we go together?' (play→performance).", script: "M: Hey, Petra. It's Jasper calling. The first showing of the play Along the River is this Saturday. Why don't we go together? W: What time does it begin? M: At 8 P.M. Tickets are $15 per person. W: Hmm... That may be a problem. Some colleagues are taking me out to eat at 5 o'clock in honor of my recent promotion. We're going to Christo's Restaurant. M: You should have enough time to eat before the play starts. Plus, the restaurant is close to the theater. W: Oh, really? In that case, I'll come!" },
    { group: 4, question: "Why is the woman planning to get together with colleagues?", options: ["(A) To celebrate a promotion", "(B) To welcome a new employee", "(C) To discuss an upcoming assignment", "(D) To prepare for a conference"], answer: "(A) To celebrate a promotion", explanation: "'taking me out to eat... in honor of my recent promotion'." },
    { group: 4, question: "What is mentioned about the restaurant?", options: ["(A) It does not open until 5 o'clock.", "(B) It is located near a theater.", "(C) It can accommodate a request.", "(D) It is holding a special event."], answer: "(B) It is located near a theater.", explanation: "'the restaurant is close to the theater' (close→near)." },
    { group: 5, question: "What does the man ask the woman about?", options: ["(A) Changes to a travel itinerary", "(B) Transportation to the airport", "(C) Hotel accommodations in Madrid", "(D) Flight ticket reservations"], answer: "(D) Flight ticket reservations", explanation: "'did you book our flight to Madrid for this Sunday?' (book→reservations).", script: "M: Leah, did you book our flight to Madrid for this Sunday? I need to know when we have to be at the airport. W: Yes, I did. The flight departs at 6 P.M. I reserved tickets with Miles Airways because Air Newlander has no flights on Saturday or Sunday. Also, I was only able to get economy class tickets. M: That's fine. I've never flown with Miles Airways, but I've heard that their in-flight services are excellent." },
    { group: 5, question: "Why did the woman make a booking with Miles Airways?", options: ["(A) She needs to follow a corporate policy.", "(B) It offers less expensive fares.", "(C) It has a weekend departure.", "(D) She wants to collect membership points."], answer: "(C) It has a weekend departure.", explanation: "'because Air Newlander has no flights on Saturday or Sunday' → Miles는 주말 항공편 있음." },
    { group: 5, question: "What does the man say about Miles Airways?", options: ["(A) The flights are always delayed.", "(B) The airfare is priced reasonably.", "(C) They provide great services.", "(D) They fly to various destinations."], answer: "(C) They provide great services.", explanation: "'their in-flight services are excellent'." },
    { group: 6, question: "What is the main topic of the conversation?", options: ["(A) A safety inspection", "(B) A policy change", "(C) An equipment malfunction", "(D) A software upgrade"], answer: "(A) A safety inspection", explanation: "'the report about our recent factory inspection' + 'high marks for all required safety measures'.", script: "W: Good morning, John. Did you see the report about our recent factory inspection? M: Yeah. It looks like we received high marks for all required safety measures. W: We did. The man looking at our equipment, Kevin Ayer, even mentioned that our facility was much cleaner than he expected. M: That's great! And I think our new computer software will help us manage the plant better as well. W: Oh, right. Actually, can you show me how to operate the software? M: Well... I'm attending a workshop next week. It is for staff members who will be using the program for the first time. You can still sign up if you're interested." },
    { group: 6, question: "What does the woman say about Kevin Ayer?", options: ["(A) He made an error on a report.", "(B) He works on a production team.", "(C) He repairs factory machinery.", "(D) He commented on cleanliness."], answer: "(D) He commented on cleanliness.", explanation: "'Kevin Ayer, even mentioned that our facility was much cleaner than he expected'." },
    { group: 6, question: "What does the man mean when he says, \"I'm attending a workshop next week\"?", options: ["(A) He will talk to a manager.", "(B) He cannot visit a plant.", "(C) He will install an application.", "(D) He cannot use a program."], answer: "(D) He cannot use a program.", explanation: "소프트웨어 사용법을 묻자 처음 사용할 직원용 워크숍에 참석한다고 답 → 자신도 아직 사용 못 함." },
    { group: 7, question: "Where most likely is the conversation taking place?", options: ["(A) In a furniture showroom", "(B) At a shopping center", "(C) In a clothing store", "(D) At an interior design firm"], answer: "(B) At a shopping center", explanation: "'a furniture and bedding store in this shopping mall' (mall→center). (3인 대화 M1/M2/W)", script: "M1: Excuse me. The two of us are looking for a furniture and bedding store in this shopping mall. M2: There isn't one. The closest furniture shop is across the street. W: I see. We'll go there, then. Also, I'd like to validate our parking ticket. We just parked here a few minutes ago, so we don't want to be charged for such a short time. M2: That won't be a problem. It's free of charge if you park for less than 30 minutes. W: Great. And would you mind telling us the easiest way to get to the West Lot from here? M2: Just take the food court elevator to basement floor two. M1: Perfect. Thanks for your help." },
    { group: 7, question: "Why does the woman want to avoid a charge?", options: ["(A) She was unaware of a change.", "(B) She has not parked for long.", "(C) She forgot her store membership card.", "(D) She is dissatisfied with a service."], answer: "(B) She has not parked for long.", explanation: "'We just parked here a few minutes ago, so we don't want to be charged for such a short time'." },
    { group: 7, question: "What does the woman ask for?", options: ["(A) A discount for an item", "(B) Details about an event", "(C) Directions to a facility", "(D) A name of a business"], answer: "(C) Directions to a facility", explanation: "'the easiest way to get to the West Lot from here?' (West Lot→facility)." },
    { group: 8, question: "What does the woman say she will do this weekend?", options: ["(A) Attend a conference", "(B) Spend time with some friends", "(C) Visit relatives in another city", "(D) Join a class"], answer: "(B) Spend time with some friends", explanation: "'I am going with some friends of mine to a resort'.", script: "W: I am really looking forward to the long weekend. I am going with some friends of mine to a resort just outside of Miami on Thursday. We plan to stay until Sunday afternoon. M: Really? Have you checked the weather forecast recently? There is a severe tropical storm that is expected to reach that area on Friday evening. I think you may have to reschedule your weekend getaway. W: Oh, no! That's really disappointing. I guess I should contact the resort to cancel our booking. I am a little worried we won't be able to get our deposit back though." },
    { group: 8, question: "What does the man say the woman should do?", options: ["(A) Pay a deposit by credit card", "(B) Access a Web site", "(C) Contact a resort by phone", "(D) Reschedule a planned trip"], answer: "(D) Reschedule a planned trip", explanation: "'I think you may have to reschedule your weekend getaway'." },
    { group: 8, question: "Why is the woman concerned?", options: ["(A) She has to find transportation.", "(B) She has to work overtime.", "(C) She may not receive a refund.", "(D) She could not make a reservation."], answer: "(C) She may not receive a refund.", explanation: "'worried we won't be able to get our deposit back' (get deposit back→refund)." },
    { group: 9, question: "Why is the man interested in moving?", options: ["(A) He needs to live closer to his office.", "(B) He would like a smaller apartment.", "(C) He wants to be in a modern building.", "(D) He cannot afford his current rent."], answer: "(C) He wants to be in a modern building.", explanation: "'want to move to a more modern complex'.", script: "W: Hello. Welcome to Summer Realty. How can I assist you? M: I'm looking for an apartment on Hanover Street. I already live near there but want to move to a more modern complex. W: There's a new development at 450 Hanover Street. I can arrange a showing for you, if you'd like. M: Are there any two-bedroom apartments that cost $1,800 or less to rent? W: You're in luck. A unit that sounds perfect for you just became available. M: That sounds great. I'm free to tour it tomorrow afternoon. [Graphic — Unit/Bedrooms/Rental Fee: 201A/1/$1,700; 304C/1/$1,750; 406A/2/$1,775; 502B/2/$1,825]" },
    { group: 9, question: "What does the woman offer to do?", options: ["(A) Reduce a rate", "(B) Set up an appointment", "(C) Print a contract", "(D) Find a tenant"], answer: "(B) Set up an appointment", explanation: "'I can arrange a showing for you' (arrange a showing→set up an appointment)." },
    { group: 9, question: "Look at the graphic. Which unit will the man probably tour?", options: ["(A) 201A", "(B) 304C", "(C) 406A", "(D) 502B"], answer: "(C) 406A", explanation: "침실 2개·$1,800 이하 → 시각자료상 406A($1,775)." },
    { group: 10, question: "What problem does the woman mention?", options: ["(A) A product is damaged.", "(B) A discount was not applied.", "(C) A garment is too small.", "(D) A shipment did not arrive."], answer: "(A) A product is damaged.", explanation: "'one of the buttons has already fallen off'.", script: "W: Hi. I bought this jacket from your store. However, one of the buttons has already fallen off. M: Let me see the item... Oh, yes. That's definitely a problem. W: I'm wondering if I can get a refund. M: When did you buy the garment? If it was less than a month ago, that'll be fine. W: I bought it just last week. Here's the receipt. Also, I was told that you would be getting a shipment of Carmona products soon. Has it arrived yet? I need to get a new pair of shoes. M: Yes. We just stocked them. W: Great. I'd like to take a look once we're finished here. [Sign — Aisle 1: Jackets; Aisle 2: Shirts; Aisle 3: Pants; Aisle 4: Shoes]" },
    { group: 10, question: "What does the man inquire about?", options: ["(A) A payment method", "(B) A delivery fee", "(C) A purchase date", "(D) A home address"], answer: "(C) A purchase date", explanation: "'When did you buy the garment?'." },
    { group: 10, question: "Look at the graphic. Which aisle are the Carmona products located in?", options: ["(A) Aisle 1", "(B) Aisle 2", "(C) Aisle 3", "(D) Aisle 4"], answer: "(D) Aisle 4", explanation: "'I need to get a new pair of shoes' → 표지판상 Shoes는 Aisle 4." },
  ] },
  { day: 9, part: "Part 3", questions: [
    { group: 1, question: "Why do the speakers want to meet?", options: ["(A) To visit a construction site", "(B) To plan a department seminar", "(C) To finalize a marketing strategy", "(D) To discuss a factory renovation"], answer: "(A) To visit a construction site", explanation: "여자가 'check on the construction of our new building'이라며 'Can we go to the site at about 2 P.M.?'라고 함. 공사 현장 방문이므로 (A).", script: "W: Paul, are you available on Monday to check on the construction of our new building at the Marina Complex? M: Hmm... Let me check. I have to participate in a training session at 10 A.M. on Monday. Then I'm having lunch with a former colleague at noon. Can we go to the site at about 2 P.M.? W: That's fine. I have to read through a report the project engineer is sending me that day, but I'll be finished before then. M: OK, so that's Monday at 2. I'll see you then." },
    { group: 1, question: "What will the man most likely do at 10 A.M. on Monday?", options: ["(A) Have a meal", "(B) Interview an applicant", "(C) Attend a workshop", "(D) Tour a complex"], answer: "(C) Attend a workshop", explanation: "남자가 'I have to participate in a training session at 10 A.M.'라고 함. training session → workshop." },
    { group: 1, question: "Who will most likely send the woman a report?", options: ["(A) A building manager", "(B) An engineer", "(C) A sales representative", "(D) An accountant"], answer: "(B) An engineer", explanation: "여자가 'a report the project engineer is sending me'라고 함." },
    { group: 2, question: "What does the man need to do this afternoon?", options: ["(A) Download a program", "(B) Revise a report", "(C) Submit a form", "(D) Make a payment"], answer: "(C) Submit a form", explanation: "남자가 'a travel reimbursement form that I need to submit this afternoon'이라고 함.", script: "M: I'm trying to print a travel reimbursement form that I need to submit this afternoon. Do you know where the paper for the printer is kept? W: I just got the last two packs from the storeroom. Here you go. M: Thanks. I guess we should buy some more, then. W: I was going to do that. We use Wilson Stationery, right? M: Yes. They have a new smartphone app that makes it really easy to place an order. W: Great. I'll download it now and then purchase what we need." },
    { group: 2, question: "What does the woman give the man?", options: ["(A) Some printer paper", "(B) A sales receipt", "(C) A storeroom key", "(D) Some ink cartridges"], answer: "(A) Some printer paper", explanation: "여자가 'I just got the last two packs from the storeroom. Here you go'라며 프린터 용지를 줌." },
    { group: 2, question: "How will the woman place an order?", options: ["(A) By e-mailing a salesperson", "(B) By going to a shop", "(C) By using a mobile application", "(D) By calling a supplier"], answer: "(C) By using a mobile application", explanation: "'a new smartphone app'으로 주문하므로 (C)." },
    { group: 3, question: "Who most likely is the woman?", options: ["(A) A cashier", "(B) A driver", "(C) A receptionist", "(D) A dentist"], answer: "(C) A receptionist", explanation: "예약을 확인해 주고 'Dr. Cruz hasn't arrived yet'라며 안내하므로 치과 접수원.", script: "M: Good afternoon. I'm here for my 1:30 appointment with Dr. Cruz. W: I'm sorry to tell you that Dr. Cruz hasn't arrived yet. He just called. He's been stuck in traffic for the past half hour due to some road construction. Are you here for the teeth cleaning? M: No. I'm actually here to get my teeth checked. W: Oh, OK. Then please wait in the room over there until Dr. Cruz arrives. He should be here in 15 minutes. M: Thanks. I'll do that." },
    { group: 3, question: "What does the man want to do?", options: ["(A) Change an appointment", "(B) Get a checkup", "(C) Request a cleaning", "(D) Pay for a medical bill"], answer: "(B) Get a checkup", explanation: "남자가 'I'm actually here to get my teeth checked'라고 함." },
    { group: 3, question: "How long will the man probably wait?", options: ["(A) For 5 minutes", "(B) For 15 minutes", "(C) For half an hour", "(D) For an hour"], answer: "(B) For 15 minutes", explanation: "여자가 'He should be here in 15 minutes'라고 함." },
    { group: 4, question: "What is the reason for the call?", options: ["(A) A rental vehicle should be returned.", "(B) A personal loan needs to be repaid.", "(C) A travel plan will be changed.", "(D) A pick-up time must be arranged."], answer: "(D) A pick-up time must be arranged.", explanation: "여자가 승합차를 가지러 갈 편한 시간을 물으므로 (D).", script: "W: Seth, it's Rita calling. Last week, you said I could borrow your van for the day. I'm wondering when it would be convenient for me to stop by your house to get it. M: That's right. I totally forgot. You're moving some belongings into your new apartment today, right? W: Yeah. A few of my cousins will be arriving in an hour to help me, so it'd be nice if I could get the vehicle before then. Is that going to work for you? M: Yes, definitely. You can come by in 30 minutes. I'm going to the supermarket now, but I'll be home shortly." },
    { group: 4, question: "Who is the woman expecting in an hour?", options: ["(A) Some relatives", "(B) Some friends", "(C) A landlord", "(D) A delivery person"], answer: "(A) Some relatives", explanation: "'A few of my cousins will be arriving in an hour'. cousins → relatives." },
    { group: 4, question: "What will the man most likely do next?", options: ["(A) Repair a van", "(B) Make a phone call", "(C) Visit a store", "(D) Prepare a meal"], answer: "(C) Visit a store", explanation: "남자가 'I'm going to the supermarket now'라고 함." },
    { group: 5, question: "What is the conversation mainly about?", options: ["(A) A shop relocation", "(B) A stock report", "(C) Job openings", "(D) Event invitations"], answer: "(D) Event invitations", explanation: "남자가 'shops that make event invitations'에 관해 이야기함.", script: "M: Do you know of any other shops that make event invitations? I need to have several options for the stockholders' luncheon next month. W: I thought our usual invitation designer, Corporate Prints, was going to handle that. What happened? M: Well, it turns out they can't accept our order due to the short notice. So, we need to hire another designer. W: Oh, I see. Well, I have a friend who's an event consultant. I'll call her right away and ask if she can recommend some shops. I'll let you know as soon as I've spoken to her." },
    { group: 5, question: "Why can't the man use Corporate Prints?", options: ["(A) The order was placed too late.", "(B) The store recently closed down.", "(C) The store lacks experienced designers.", "(D) The order was too small."], answer: "(A) The order was placed too late.", explanation: "'they can't accept our order due to the short notice'. 촉박한 통보 때문." },
    { group: 5, question: "How can the woman assist the man?", options: ["(A) By contacting several nearby shops", "(B) By reporting on the stock market", "(C) By talking to an event consultant", "(D) By looking through a business directory"], answer: "(C) By talking to an event consultant", explanation: "'I have a friend who's an event consultant. I'll call her'." },
    { group: 6, question: "What will the woman prepare?", options: ["(A) A list of job candidates", "(B) An application form", "(C) A workspace lease", "(D) A job posting"], answer: "(D) A job posting", explanation: "'Can you put together a job advertisement?'에 'Sure'. job advertisement → job posting.", script: "M: Marilyn, we need to hire about 50 more factory workers. Can you put together a job advertisement? W: Sure. Is it for the Newman Town factory? M: No. It's actually for the factory we opened two months ago. We're planning to increase our production by 25 percent. W: That's a lot. Has demand for our digital cameras gone up that much? M: Not really. But last week, we signed a contract with a Japanese retailer to stock our products beginning in June. W: That's exciting. This is the first time we'll be exporting our goods." },
    { group: 6, question: "What happened last week?", options: ["(A) A device was reviewed.", "(B) A plant was opened.", "(C) An agreement was finalized.", "(D) An advertisement was approved."], answer: "(C) An agreement was finalized.", explanation: "'last week, we signed a contract'. signed a contract → agreement finalized." },
    { group: 6, question: "What does the woman say about the company's products?", options: ["(A) They will be made in Japan from next year.", "(B) They have been inspected by an official.", "(C) They have been redesigned to be more appealing.", "(D) They will be sold overseas for the first time."], answer: "(D) They will be sold overseas for the first time.", explanation: "'This is the first time we'll be exporting our goods'." },
    { group: 7, question: "What is the woman's problem?", options: ["(A) She cannot locate a concert hall.", "(B) She is unable to use some tickets.", "(C) She could not find an available flight.", "(D) She forgot to request a day off from work."], answer: "(B) She is unable to use some tickets.", explanation: "'I bought tickets... but I have to stay late at work. I'm trying to get someone to buy my tickets'.", script: "W: Are you interested in seeing a jazz concert tonight, Joseph? I bought tickets to The Dazzling Dames, but I have to stay late at work. I'm trying to get someone to buy my tickets because I don't want to lose the money I spent on them. M: I'm leaving for the conference in Stockholm this evening, so I won't be able to go. It's too bad, because I really love The Dazzling Dames. W: Do you know of anyone else who might be interested? M: Why don't you call Ron in marketing? I know he's a jazz fan." },
    { group: 7, question: "What is the man planning to do this evening?", options: ["(A) Attend a performance", "(B) Meet with a client", "(C) Go on a business trip", "(D) Ask for a refund"], answer: "(C) Go on a business trip", explanation: "'I'm leaving for the conference in Stockholm this evening'." },
    { group: 7, question: "What does the man suggest?", options: ["(A) Purchasing some tickets", "(B) Rescheduling an event", "(C) Leaving for the airport", "(D) Speaking with a colleague"], answer: "(D) Speaking with a colleague", explanation: "'Why don't you call Ron in marketing?'." },
    { group: 8, question: "What are the speakers talking about?", options: ["(A) Departure times for trains", "(B) A report from a local newspaper", "(C) A recently opened subway line", "(D) Commute times for suburban residents"], answer: "(C) A recently opened subway line", explanation: "'I took the new subway line this morning, and it's fantastic!'.", script: "M: I took the new subway line this morning, and it's fantastic! W1: Don't the trains on that line have more seats than other ones? W2: I read in the local newspaper that each subway car has 15 more seats than the older ones. M: I'm quite happy with the new line. Finding a seat on the way to work is much easier now. W2: That's good to hear. I usually avoid public transit because it's so crowded, but maybe I should try it. W1: Yeah. It doesn't sound like that's an issue anymore. M: Plus, I save a lot of money. Commuting by car can be kind of expensive." },
    { group: 8, question: "Why is the man pleased?", options: ["(A) He can take a shorter route to work.", "(B) He can sit down during his commute.", "(C) He is able to carpool with colleagues.", "(D) He gets to leave the office early."], answer: "(B) He can sit down during his commute.", explanation: "'Finding a seat on the way to work is much easier now'." },
    { group: 8, question: "Why does the man say, \"I save a lot of money\"?", options: ["(A) To offer a reason for purchasing a monthly pass", "(B) To explain why he moved closer to his workplace", "(C) To point out an advantage of public transportation", "(D) To suggest that subway fares have been reduced"], answer: "(C) To point out an advantage of public transportation", explanation: "돈을 절약한다며 'Commuting by car can be kind of expensive'. 대중교통의 장점을 강조." },
    { group: 9, question: "Who most likely is George?", options: ["(A) A facility owner", "(B) A hotel worker", "(C) A sales associate", "(D) A service technician"], answer: "(B) A hotel worker", explanation: "'the new front desk worker at this hotel'.", script: "W: Hello, Mr. Leakes. I'm evaluating some of our employees, and I'd like your opinion of the new front desk worker at this hotel. M: George is doing well so far. He's especially good at customer service and communicating with his coworkers. W: I'm glad to hear it. However, do you feel as though there are any aspects of the job that he could improve upon? M: Well... um... he sometimes incorrectly directs guest phone calls. Oh, and his punctuality could be improved, too. W: OK, got it. Would you mind looking over the evaluation before I give it to George? I want to make sure that your feedback is accurately reflected. M: I'd be glad to do that. [Graphic — Evaluation: Customer service=Satisfactory, Communicating with coworkers=Satisfactory, Directing phone calls=Unsatisfactory, Punctuality=Satisfactory]" },
    { group: 9, question: "Look at the graphic. Which job skill has been incorrectly marked?", options: ["(A) Customer service", "(B) Communicating with coworkers", "(C) Directing phone calls", "(D) Punctuality"], answer: "(D) Punctuality", explanation: "남자가 'his punctuality could be improved'라 했는데 표엔 Punctuality가 Satisfactory로 표시됨 → 잘못 표시된 항목 (D)." },
    { group: 9, question: "What does the woman ask the man to do?", options: ["(A) Open an account", "(B) Review a document", "(C) Conduct some training", "(D) Fill out a form"], answer: "(B) Review a document", explanation: "'Would you mind looking over the evaluation...?' 평가서 검토." },
    { group: 10, question: "Why is the man late?", options: ["(A) He had to work overtime.", "(B) He got stuck in traffic.", "(C) He forgot about an appointment.", "(D) He needed to run an errand."], answer: "(B) He got stuck in traffic.", explanation: "'the congestion on Highway 13 is really bad right now'. congestion → stuck in traffic.", script: "M: I'm so sorry that I'm late. I came to the theater right after work, but the congestion on Highway 13 is really bad right now. W: Oh, that's OK. We still have about 10 minutes before it begins... I'm really excited for the performance. I read that the actress playing the role of the spy recently received an award from the National Theater Association. M: Really? I had no idea. W: Well, let's head into the theater to find our seats. I want to settle in before the performance starts. [Cast List — Midnight in Beijing: General=Han Lee, Nurse=Mei Chin, Detective=Bo Lou, Spy=Fen Vang]" },
    { group: 10, question: "Look at the graphic. Who recently won an award?", options: ["(A) Han Lee", "(B) Mei Chin", "(C) Bo Lou", "(D) Fen Vang"], answer: "(D) Fen Vang", explanation: "'the actress playing the role of the spy recently received an award'. 표에서 Spy 역은 Fen Vang." },
    { group: 10, question: "What will the speakers probably do next?", options: ["(A) Find their seats", "(B) Check their coats", "(C) Get some tickets", "(D) Review a program"], answer: "(A) Find their seats", explanation: "'let's head into the theater to find our seats'." },
  ] },
  { day: 10, part: "Part 3", questions: [
    { group: 1, question: "What is the problem?", options: ["(A) A staff member is busy.", "(B) A dinner party has been canceled.", "(C) A food option is unavailable.", "(D) A dish has been prepared incorrectly."], answer: "(C) A food option is unavailable.", explanation: "남자가 'we've run out of that cake for this evening'이라며 음식 선택지를 이용할 수 없음을 알림.", script: "W: Excuse me. I want to try the dark chocolate cake, but I'm worried it has nuts in it. I'm allergic to them. M: Unfortunately, we've run out of that cake for this evening. However, if you'd still like to have something with chocolate, then I highly recommend our cocoa pudding. It's completely free of nuts. W: I'd love that. It sounds delicious. Also, do you offer any specialty coffee drinks? M: We certainly do. They're all listed on the last page of our menu." },
    { group: 1, question: "Why does the man say, \"It's completely free of nuts\"?", options: ["(A) To confirm an order", "(B) To express surprise", "(C) To determine a preference", "(D) To reassure a customer"], answer: "(D) To reassure a customer", explanation: "견과류 알레르기를 걱정하는 손님을 안심시키려는 의도." },
    { group: 1, question: "What does the woman ask the man about?", options: ["(A) Menu changes", "(B) Daily specials", "(C) Chef recommendations", "(D) Specialty beverages"], answer: "(D) Specialty beverages", explanation: "'do you offer any specialty coffee drinks?'. drinks → beverages." },
    { group: 2, question: "Where is the conversation most likely taking place?", options: ["(A) In a furniture store", "(B) In a bank", "(C) In a restaurant", "(D) In a company warehouse"], answer: "(C) In a restaurant", explanation: "'our restaurant's grand opening'을 언급.", script: "M: We've only got a few hours before our restaurant's grand opening, and there's still a lot to do. Did Karen buy the dishes we need? I asked her to buy some round plates. W: Well... She just put some square ones on the table. M: Really? We need to match the plates we already have. W: I can let her know, since you're busy setting up the decorations. Don't worry. We can deal with this problem quickly." },
    { group: 2, question: "What does the woman mean when she says, \"She just put some square ones on the table\"?", options: ["(A) A decision was approved by a supervisor.", "(B) An order was sent to the wrong location.", "(C) An incorrect purchase was made.", "(D) A customer complaint was received."], answer: "(C) An incorrect purchase was made.", explanation: "둥근 접시를 요청했는데 네모난 것을 사와 잘못된 구매가 이뤄짐." },
    { group: 2, question: "What does the woman offer to do?", options: ["(A) Put up some decorations", "(B) Return to a retail outlet", "(C) Prepare some ingredients", "(D) Notify a colleague"], answer: "(D) Notify a colleague", explanation: "'I can let her know'(Karen에게 알리겠다)." },
    { group: 3, question: "What will the man do in the morning?", options: ["(A) Deliver a speech", "(B) Converse with shareholders", "(C) Inspect a distribution facility", "(D) Promote a new product"], answer: "(A) Deliver a speech", explanation: "'the lecture on product distribution I'll be doing there'. lecture → speech.", script: "M: Jenna, has everything been prepared for my business trip to Lima? I'm getting a bit nervous about the lecture on product distribution I'll be doing there. W: Everything is ready. I have your itinerary right here. I've arranged for the taxi to the airport to pick you up at the bus stop in front of our office at 7 A.M. M: All right. Did you make sure to book me a business class seat on the flight? W: I did. You're a gold member of Hart Airlines, so you were eligible for a discounted seat upgrade." },
    { group: 3, question: "How will the man get to the airport?", options: ["(A) By driving his car", "(B) By riding a bus", "(C) By using the subway", "(D) By taking a taxi"], answer: "(D) By taking a taxi", explanation: "'I've arranged for the taxi to the airport'." },
    { group: 3, question: "What does the woman suggest about Hart Airlines?", options: ["(A) It serves complimentary meals.", "(B) It has a membership program.", "(C) It offers annual discounts.", "(D) It aims to attract budget travelers."], answer: "(B) It has a membership program.", explanation: "'You're a gold member of Hart Airlines'." },
    { group: 4, question: "Why does the man say, \"You attended the trade show in Dallas last month, right\"?", options: ["(A) To show that he values the woman's opinion", "(B) To encourage the woman to participate in an event", "(C) To tell the woman the location of a venue", "(D) To indicate that he knows the woman"], answer: "(D) To indicate that he knows the woman", explanation: "'I don't know if you remember me'에 대해 지난달 박람회 참석을 언급하며 그녀를 알아봄.", script: "W: Mr. Kudlow, I don't know if you remember me. My name is Sangha Lee. M: You attended the trade show in Dallas last month, right? What can I do for you? W: Well, the company I work for, Beyond Apparel, wants to develop a better reputation among consumers. I was hoping you could help us with that. M: Definitely. But it'd be best to talk in person. Would you be able to stop by my office next Thursday at 1 P.M.? W: That will be fine. I'll see you then." },
    { group: 4, question: "What is mentioned about Beyond Apparel?", options: ["(A) It is about to release another clothing line.", "(B) It will be sponsoring an upcoming show.", "(C) It wants to improve its public image.", "(D) It is planning to open another store."], answer: "(C) It wants to improve its public image.", explanation: "'wants to develop a better reputation among consumers'." },
    { group: 4, question: "What does the man ask the woman to do?", options: ["(A) Send an e-mail", "(B) Visit his office", "(C) Get an estimate", "(D) Meet with his colleague"], answer: "(B) Visit his office", explanation: "'Would you be able to stop by my office...?' stop by → Visit." },
    { group: 5, question: "What are the speakers mainly discussing?", options: ["(A) A factory inspection", "(B) A customer complaint", "(C) A marketing campaign", "(D) A device upgrade"], answer: "(B) A customer complaint", explanation: "'the complaint we received last week' (무선 스피커 관련).", script: "W: Phil, have you been told about the complaint we received last week? I think it was regarding our wireless speakers. M: It has been taken care of. The customer mentioned damage to a component. I sent out a new unit and have received no further correspondence. W: OK. But this has happened before. We shouldn't have any more issues like this. M: I'll get in touch with the supervisor at our factory and ask him to send me a report on this issue." },
    { group: 5, question: "What does the woman imply when she says, \"we don't have any more issues like this\"?", options: ["(A) Product quality must be ensured.", "(B) Accurate information must be provided.", "(C) Shipping costs must be reduced.", "(D) Additional features must be added."], answer: "(A) Product quality must be ensured.", explanation: "'this has happened before. We shouldn't have any more issues like this' → 품질 보장 필요." },
    { group: 5, question: "What will the man most likely receive?", options: ["(A) A report", "(B) A payment", "(C) A sample", "(D) An invoice"], answer: "(A) A report", explanation: "'ask him to send me a report on this issue'." },
    { group: 6, question: "What are the speakers mainly discussing?", options: ["(A) An employee evaluation", "(B) A meeting topic", "(C) A faulty product", "(D) A feedback summary"], answer: "(B) A meeting topic", explanation: "'decide what to focus on for our presentation at the shareholders meeting'.", script: "M: Good morning, Cassie. We need to decide what to focus on for our presentation at the shareholders meeting. W: Do you have any suggestions? M: Why don't we discuss our newest line of kitchen appliances? W: That's a good idea. It'd be good to know how profitable it's been. M: OK. Do you have anything else to do now? We don't have a lot of time before the meeting. W: I'm free today. M: Can you get me the details about our firm's sales volume from last quarter? I'll begin by analyzing that." },
    { group: 6, question: "Why does the man say, \"Do you have anything else to do now\"?", options: ["(A) A meeting must be rescheduled.", "(B) A change may be necessary.", "(C) A sale must be completed.", "(D) A project should be started."], answer: "(D) A project should be started.", explanation: "회의 전 시간이 없다며 매출 분석 업무를 맡기려는 흐름." },
    { group: 6, question: "What does the man request?", options: ["(A) An appliance manual", "(B) Some business data", "(C) Some survey responses", "(D) A sales receipt"], answer: "(B) Some business data", explanation: "'the details about our firm's sales volume from last quarter'. → business data." },
    { group: 7, question: "Who is Mary Frasier?", options: ["(A) A board member", "(B) An accountant", "(C) A team leader", "(D) An illustrator"], answer: "(C) A team leader", explanation: "'Mary Frasier, the head of the IT team'. head → team leader.", script: "W: Hey, Matt. Did you create the booklets for the technical training sessions I've been attending? M: You mean the ones about the new accounting software? Mary Frasier, the head of the IT team, put those together. Why? W: Well, I don't find them to be very useful. There aren't enough illustrations to clearly show how different software features are used. I asked our instructor if we could get new booklets, but he said that wouldn't be possible. M: The workshop ends in one day. Hmm... I'll give your feedback to Mary so that her team can make better materials for future workshops. W: Thanks. I really appreciate that." },
    { group: 7, question: "According to the woman, why are the booklets not useful?", options: ["(A) They are lacking images.", "(B) They are complicated.", "(C) They are outdated.", "(D) They are missing pages."], answer: "(A) They are lacking images.", explanation: "'There aren't enough illustrations'. illustrations → images." },
    { group: 7, question: "Why does the man say, \"The workshop ends in one day\"?", options: ["(A) To confirm the date of an event", "(B) To explain why a request was denied", "(C) To specify when a project will begin", "(D) To stress the need for more training"], answer: "(B) To explain why a request was denied", explanation: "새 소책자 요청이 거절된 상황에서 워크숍이 하루 뒤면 끝난다고 함 → 거절 이유 설명." },
    { group: 8, question: "What problem does the woman mention?", options: ["(A) A seminar was canceled.", "(B) A task is delayed.", "(C) An employee quit.", "(D) A camera is broken."], answer: "(B) A task is delayed.", explanation: "'storyboard creation is still behind schedule'. behind schedule → delayed.", script: "W: We should review plans for the commercial shoot. I heard storyboard creation is still behind schedule. M: It'll be finished by Thursday. Let's look at it then. What about hiring a new cameraperson? W: The applicant we interviewed last week accepted our job offer. M: So, in total, we'll have a crew of 10 people for the shoot. W: Right. But who'll do equipment preparations? M: What about asking Dave Harrison to set up the microphones and speakers? He's done a great job on similar projects. W: OK. I'll call him when we're done here." },
    { group: 8, question: "What happened last week?", options: ["(A) An interview was conducted.", "(B) Equipment was purchased.", "(C) A commercial was aired.", "(D) Transportation was arranged."], answer: "(A) An interview was conducted.", explanation: "'The applicant we interviewed last week accepted our job offer'." },
    { group: 8, question: "What does the man imply about Dave Harrison?", options: ["(A) He requested a larger crew.", "(B) He was given a promotion.", "(C) He will star in a commercial.", "(D) He is familiar with audio equipment."], answer: "(D) He is familiar with audio equipment.", explanation: "마이크·스피커 설치를 부탁하며 'He's done a great job on similar projects'." },
    { group: 9, question: "What does the woman say about the museum gala?", options: ["(A) It is held annually.", "(B) It features celebrity speakers.", "(C) It is attended by supporters.", "(D) It was organized by the city."], answer: "(C) It is attended by supporters.", explanation: "'We'll likely meet several of our newest sponsors'. sponsors → supporters.", script: "M1: Wow! There are a lot of attendees here at our museum gala tonight. W: Yeah. We'll likely meet several of our newest sponsors. M2: I agree. Did you see that Howard Porter from city hall is here? W: Yes. He's in charge of funding for arts projects all over the city, right? M2: That's correct. I think we should go introduce ourselves to him. W: Oh... I need to check the projector system. Our director will be giving her speech soon. M1: OK. We'll wait here for you. (3인 대화: M1/W/M2)" },
    { group: 9, question: "What does the woman mean when she says, \"I need to check the projector system\"?", options: ["(A) She will introduce a contributor.", "(B) She cannot meet a guest now.", "(C) She wants to deal with a problem alone.", "(D) She worries that a device was not ordered."], answer: "(B) She cannot meet a guest now.", explanation: "Howard Porter에게 인사하자는 제안에 프로젝터를 확인해야 한다며 지금은 못 만남." },
    { group: 9, question: "What will the director do?", options: ["(A) Announce a facility change", "(B) Revise an opening speech", "(C) Review a project budget", "(D) Address a crowd of attendees"], answer: "(D) Address a crowd of attendees", explanation: "'Our director will be giving her speech soon'. giving a speech → Address." },
    { group: 10, question: "What does the woman agree with the man about?", options: ["(A) The problem with traveling overseas", "(B) The need to promote products", "(C) The plan for launching a service", "(D) The decision to reduce expenses"], answer: "(B) The need to promote products", explanation: "'We should come up with ways to promote our travel guidebooks'에 'I agree'.", script: "M: We should come up with ways to promote our travel guidebooks. W: I agree. Those books are not as popular as they used to be, and this has put our publishing company in a difficult financial situation. I suggest we bundle them as sets at discounted prices. M: That's a good idea. W: Once we have set the prices, please update our Web site to include information about this promotion. M: OK. Also, maybe we should also advertise the books in magazines or on television. W: Hmm... I'll arrange an appointment with the marketing firm we hired last time to discuss this." },
    { group: 10, question: "What is suggested about the publishing company?", options: ["(A) It hosts a number of events.", "(B) It has had a decline in sales.", "(C) It operates several branches.", "(D) It has updated its Web site."], answer: "(B) It has had a decline in sales.", explanation: "'Those books are not as popular as they used to be, and this has put our publishing company in a difficult financial situation'." },
    { group: 10, question: "What will the woman probably do next?", options: ["(A) Make an appointment", "(B) Send a package", "(C) Print a brochure", "(D) Complete a survey"], answer: "(A) Make an appointment", explanation: "'I'll arrange an appointment with the marketing firm'. arrange → Make." },
  ] },
  { day: 11, part: "Part 3", questions: [
    { group: 1, question: "What does the man request that the woman do?", options: ["(A) Purchase goods for colleagues", "(B) Distribute office supplies to staff", "(C) Replace broken equipment", "(D) Write down a list of supplies"], answer: "(A) Purchase goods for colleagues", explanation: "'you should get items for our team while you're there'.", script: "W: Can we move the accounting meeting to some other time? I won't be around this afternoon. M: Sure. What do you need to do instead? W: Ms. Jenkins asked me to run an errand for her. So, I have to go to the office supply store. M: Oh, you should get items for our team while you're there. W: What do you want me to buy? M: Check our inventory and make sure we have at least five of each item in stock. Thanks a lot! W: OK. I'll make sure to purchase any items that are running low. [Graphic — Inventory: Notebooks 8, Envelopes 6, Binders 3, Pens 10]" },
    { group: 1, question: "What will the woman probably do next?", options: ["(A) Request a reimbursement", "(B) Finish a report", "(C) Meet an associate", "(D) Inspect some inventory"], answer: "(D) Inspect some inventory", explanation: "'Check our inventory and make sure we have at least five of each item'." },
    { group: 1, question: "Look at the graphic. What item will the woman most likely buy?", options: ["(A) Notebooks", "(B) Envelopes", "(C) Binders", "(D) Pens"], answer: "(C) Binders", explanation: "'purchase any items that are running low' → 재고 최저(3개)는 Binders." },
    { group: 2, question: "Why is the sales director delayed?", options: ["(A) He got stuck in traffic.", "(B) A flight arrived late.", "(C) A meeting was extended.", "(D) He got lost."], answer: "(B) A flight arrived late.", explanation: "'the sales director will be late because his flight arrived behind schedule'.", script: "M: Amanda, I just wanted to let you know the sales director will be late because his flight arrived behind schedule. W: Well, that will give us more time to get ready for our meeting with him. Do you have the printouts prepared? M: Yes. I just finished the sales report and made several copies. Could you please check the figures in the chart? W: Sure. I think the director wants to focus on the month with the lowest sales, so I'll confirm the number for that one first. [Graphic — Monthly Sales: Sep, Oct (lowest), Nov, Dec]" },
    { group: 2, question: "What does the man say about the sales report?", options: ["(A) It was submitted to executives.", "(B) It was distributed by e-mail.", "(C) It was recently completed.", "(D) It was written by a manager."], answer: "(C) It was recently completed.", explanation: "'I just finished the sales report'." },
    { group: 2, question: "Look at the graphic. Which month's sales will the woman confirm?", options: ["(A) September", "(B) October", "(C) November", "(D) December"], answer: "(B) October", explanation: "'the month with the lowest sales' → 그래프상 매출 최저는 October." },
    { group: 3, question: "Look at the graphic. Which section did the man get tickets for?", options: ["(A) Section 1", "(B) Section 2", "(C) Section 3", "(D) Section 4"], answer: "(A) Section 1", explanation: "'I got orchestra seats' → 무대(STAGE) 앞 Section 1 = Orchestra Seats.", script: "W: Thanks for inviting me to watch Deborah Adams perform this Saturday. I'm really looking forward to it. M: No problem. Oh, I got orchestra seats so we can sit close to the stage. W: Great. By the way, how did you find out about the concert? M: Dave in accounting mentioned it to me. He's a big fan of her music. Anyway, do you want to meet at the venue? The performance starts at 8. W: I can pick you up in my car, if you'd like. M: Sounds good. [Graphic — STAGE; Section 1 (Orchestra Seats) closest to stage, then 2, 3, 4]" },
    { group: 3, question: "How did the man learn about the concert?", options: ["(A) By listening to a broadcast", "(B) By visiting a Web site", "(C) By reading a flyer", "(D) By speaking to a coworker"], answer: "(D) By speaking to a coworker", explanation: "'Dave in accounting mentioned it to me'." },
    { group: 3, question: "What does the woman offer to do?", options: ["(A) Confirm a booking", "(B) Provide transportation", "(C) Look up information", "(D) Pay for a meal"], answer: "(B) Provide transportation", explanation: "'I can pick you up in my car'." },
    { group: 4, question: "Look at the graphic. What will be the focus of the woman's presentation?", options: ["(A) Insufficient leave", "(B) Limited training", "(C) Outdated equipment", "(D) Inadequate pay"], answer: "(B) Limited training", explanation: "'focus on the second most common complaint' → 파이차트상 2위는 Limited Training(32%).", script: "M: Jenna, are you giving a presentation to the board of directors next week? W: Yes. I plan to discuss the results of the employee complaints survey. I'm going to focus on the second most common complaint. M: Interesting. Why aren't you going to talk about the issue that the largest number of staff members complained about? W: That was addressed by a policy change last week. M: I see... Do you still have a lot to prepare for the presentation? W: I'm almost done, actually. Carol, who is in charge of the company's Salford office, provided me with a lot of useful information and helped me come up with some specific suggestions. [Graphic — Employee Complaints: Insufficient Leave 41%, Limited Training 32%, Outdated Equipment 15%, Inadequate Pay 12%]" },
    { group: 4, question: "What did the company do last week?", options: ["(A) Held a workshop", "(B) Relocated an office", "(C) Launched a service", "(D) Updated a policy"], answer: "(D) Updated a policy", explanation: "'That was addressed by a policy change last week'." },
    { group: 4, question: "Who did the woman receive assistance from?", options: ["(A) A branch manager", "(B) A company president", "(C) A board member", "(D) A department head"], answer: "(A) A branch manager", explanation: "'Carol, who is in charge of the company's Salford office'. 지점 담당 → branch manager." },
    { group: 5, question: "Who most likely is the woman?", options: ["(A) A graphic designer", "(B) A photographer", "(C) An illustrator", "(D) An editor"], answer: "(D) An editor", explanation: "'I just finished editing Sandra's article for tomorrow's edition of our newspaper'.", script: "W: I just finished editing Sandra's article for tomorrow's edition of our newspaper. I had to make a lot of changes. M: That's unfortunate. W: Could you give her some additional training? I'm sure she could use some tips from an experienced writer. M: Sure. I'd be happy to help. By the way, did you get a chance to go through my article? W: I already e-mailed you my feedback. I'll need the final version by the Friday deadline. [Graphic — Topic/Deadline: ... Highway repairs = Friday]" },
    { group: 5, question: "What does the woman tell the man to do?", options: ["(A) Update an agenda", "(B) Organize a workspace", "(C) Train an employee", "(D) Print a document"], answer: "(C) Train an employee", explanation: "'Could you give her some additional training?'." },
    { group: 5, question: "Look at the graphic. What topic is the man working on?", options: ["(A) City events", "(B) Highway repairs", "(C) School budgets", "(D) Business closures"], answer: "(B) Highway repairs", explanation: "'I'll need the final version by the Friday deadline' → 표에서 Friday 마감은 Highway repairs." },
    { group: 6, question: "Where does the man most likely work?", options: ["(A) At a retail outlet", "(B) At an engineering firm", "(C) At a law office", "(D) At a travel agency"], answer: "(C) At a law office", explanation: "'A client of my law firm arranged a meeting'.", script: "M: Hello. I'd like to book a ticket on the next train to Milwaukee. A client of my law firm arranged a meeting at the last minute, so I need to leave on short notice. W: There is one this morning at... 11 A.M. M: What time does it get to its destination? W: It'll arrive at the station just after 3 P.M. M: OK. I'll book a seat for that train. I'd like one in the first class section, please. W: We have two aisle and two window seats remaining. M: I'd prefer a window seat, if possible. Also, I'd like whichever of the two is closest to the front of the compartment, please. Thanks. [Graphic — first class seat map; window seats 1D (front) and 3A]" },
    { group: 6, question: "What does the man ask about?", options: ["(A) Train facilities", "(B) A station address", "(C) Ticket cost", "(D) An arrival time"], answer: "(D) An arrival time", explanation: "'What time does it get to its destination?'." },
