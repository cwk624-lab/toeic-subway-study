function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function fmtTime(s) {
  if (!s || isNaN(s)) return "0:00";
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ":" + (sec < 10 ? "0" : "") + sec;
}
function fmtDate(ts) {
  if (!ts) return "-";
  const d = new Date(ts);
  return d.getFullYear() + "." + String(d.getMonth() + 1).padStart(2, "0") + "." + String(d.getDate()).padStart(2, "0");
}
const NUM = ["A", "B", "C", "D"];

// ===================== Supabase 저장 =====================
async function upsertWrong(table, matchCol, matchVal, insertRow) {
  if (!sbClient) throw new Error("Supabase 미연결");
  const { data, error } = await sbClient.from(table).select("id,wrong_count").eq(matchCol, matchVal).limit(1);
  if (error) throw error;
  const now = new Date().toISOString();
  if (data && data.length) {
    const row = data[0];
    const { error: e2 } = await sbClient.from(table).update({ wrong_count: (row.wrong_count || 0) + 1, last_wrong_at: now }).eq("id", row.id);
    if (e2) throw e2;
  } else {
    const { error: e3 } = await sbClient.from(table).insert(Object.assign({}, insertRow, { wrong_count: 1, last_wrong_at: now }));
    if (e3) throw e3;
  }
}

function Header({ title, onBack, meta }) {
  return (
    <div className="hdr">
      {onBack && <button className="back" onClick={onBack}>‹</button>}
      <h1>{title}</h1>
      {meta && <span className="meta">{meta}</span>}
    </div>
  );
}

function ProgressBar({ cur, total }) {
  const pct = total ? Math.round((cur / total) * 100) : 0;
  return (
    <div>
      <div className="prog-label"><span>진행</span><span>{cur} / {total}</span></div>
      <div className="prog"><div style={{ width: pct + "%" }} /></div>
    </div>
  );
}

function OptionList({ options, picked, answer, onPick, disabled }) {
  return (
    <div className="opts">
      {options.map((opt, i) => {
        let cls = "opt";
        if (picked != null) {
          if (opt === answer) cls += " correct";
          else if (opt === picked && opt !== answer) cls += " wrong";
        }
        return (
          <button key={i} className={cls} disabled={disabled} onClick={() => onPick(opt)}>
            <span className="ob">{NUM[i]}</span><span>{opt}</span>
          </button>
        );
      })}

  );
}

function WordRunner({ title, words, onBack, onDone }) {
  const { notify } = useContext(AppCtx);
  const [i, setI] = useState(0);
  const [picked, setPicked] = useState(null);
  const [right, setRight] = useState(0);
  const [wrong, setWrong] = useState(0);
  const cur = words[i];
  const opts = useMemo(() => {
    if (!cur) return [];
    const others = shuffle(WORDS.filter((w) => w.meaning !== cur.meaning)).slice(0, 3).map((w) => w.meaning);
    return shuffle([cur.meaning, ...others]);
  }, [i]);

  const pick = async (opt) => {
    if (picked != null) return;
    setPicked(opt);
    if (opt === cur.meaning) {
      setRight((r) => r + 1);
    } else {
      setWrong((w) => w + 1);
      try {
        await upsertWrong("wrong_words", "word", cur.word, { word: cur.word, meaning: cur.meaning, example: cur.example });
      } catch (e) {
        notify("오답 저장 실패 (Supabase): " + (e.message || e), true);
      }
    }
  };
  const next = () => {
    if (i + 1 >= words.length) { onDone({ right, wrong }); return; }
    setI(i + 1); setPicked(null);
  };

  return (
    <div className="app">
      <Header title={title} onBack={onBack} meta={`${i + 1}/${words.length}`} />
      <div className="body">
        <ProgressBar cur={i + 1} total={words.length} />
        <div className="card">
          <div className="word">{cur.word}</div>
          <div className="ex">{cur.example}</div>
        </div>
        <OptionList options={opts} picked={picked} answer={cur.meaning} onPick={pick} disabled={picked != null} />
        {picked != null && (
          <div className={"explain " + (picked === cur.meaning ? "ok" : "no")}>
            {picked === cur.meaning ? "✅ 정답입니다!" : "❌ 오답! 정답: "}<b>{cur.meaning}</b>
          </div>
        )}
        {picked != null && (
          <button className="btn primary nav-btn-row" onClick={next}>
            {i + 1 >= words.length ? "완료" : "다음 단어 →"}
          </button>
        )}
      </div>
    </div>
  );
}

// ===================== 오디오 플레이어 =====================
function AudioPlayer({ file }) {
  const ref = useRef(null);
  const [playing, setPlaying] = useState(false);
  const [cur, setCur] = useState(0);
  const [dur, setDur] = useState(0);
  const [err, setErr] = useState(false);
  const [rate, setRate] = useState(1);
  const setSpeed = (r) => { const a = ref.current; if (a) a.playbackRate = r; setRate(r); };

  useEffect(() => {
    const a = ref.current;
    if (!a) return;
    const onTime = () => setCur(a.currentTime);
    const onMeta = () => setDur(a.duration);
    const onEnd = () => setPlaying(false);
    const onErr = () => setErr(true);
    a.addEventListener("timeupdate", onTime);
    a.addEventListener("loadedmetadata", onMeta);
    a.addEventListener("ended", onEnd);
    a.addEventListener("error", onErr);
    return () => {
      a.removeEventListener("timeupdate", onTime);
      a.removeEventListener("loadedmetadata", onMeta);
      a.removeEventListener("ended", onEnd);
      a.removeEventListener("error", onErr);
    };
  }, [file]);

  const toggle = () => {
    const a = ref.current;
    if (!a) return;
    if (playing) { a.pause(); setPlaying(false); }
    else { a.play().then(() => setPlaying(true)).catch(() => setErr(true)); }
  };
  const seek = (e) => {
    const a = ref.current;
    if (a) { a.currentTime = Number(e.target.value); setCur(Number(e.target.value)); }
  };
  const skip = (sec) => {
    const a = ref.current;
    if (a) { a.currentTime = Math.max(0, Math.min(dur || 0, a.currentTime + sec)); }
  };

  return (
    <div className="player">
      <audio ref={ref} src={"./audio/" + file.fileName} preload="metadata" />
      <div className="ptitle">🎧 {file.title}</div>
      <div className="psub">{file.fileName}{err ? " · ⚠️ 파일을 찾을 수 없어요" : ""}</div>
      <input className="seek" type="range" min="0" max={dur || 0} step="0.1" value={cur} onChange={seek} />
      <div className="times"><span>{fmtTime(cur)}</span><span>{fmtTime(dur)}</span></div>
      <div className="ctrls">
        <button className="pbtn" onClick={() => skip(-5)}>« 5초</button>
        <button className="pbtn play" onClick={toggle}>{playing ? "⏸" : "▶"}</button>
        <button className="pbtn" onClick={() => skip(5)}>5초 »</button>
      </div>
      <div className="ctrls" style={{ marginTop: 8 }}>
        {[0.75, 1, 1.25].map((r) => (
          <button key={r} className="pbtn" onClick={() => setSpeed(r)}
            style={rate === r ? { background: "var(--blue)", color: "#fff", borderColor: "var(--blue)" } : null}>
            {r}x
          </button>
        ))}
      </div>
    </div>
  );
}

// ===================== LC 모드 =====================
function LcMode({ onHome }) {
  const { notify } = useContext(AppCtx);
  const parts = useMemo(() => {
    const order = ["Part 2", "Part 3", "Part 4"];
    const m = {};
    LC_FILES.forEach((f) => { (m[f.part] = m[f.part] || []).push(f); });
    return order.map((p) => ({ part: p, files: m[p] || [] }));
  }, []);

  const [file, setFile] = useState(null);
  const [round, setRound] = useState(1); // 1:듣기, 2:풀기, 3:오답
  const [i, setI] = useState(0);
  const [picked, setPicked] = useState(null);
  const [wrongList, setWrongList] = useState([]); // round2에서 틀린 문제
  const [r2done, setR2done] = useState(false);

  const quizzes = file ? LC_QUIZZES[file.id] : [];
  const roundQuizzes = round === 3 ? wrongList : quizzes;
  const cur = roundQuizzes[i];

  const openFile = (f) => {
    setFile(f); setRound(1); setI(0); setPicked(null); setWrongList([]); setR2done(false);
  };
  const startRound = (r) => {
    setRound(r); setI(0); setPicked(null);
    if (r === 2) { setWrongList([]); setR2done(false); }
  };

  const pick = async (opt) => {
    if (picked != null) return;
    setPicked(opt);
    if (opt !== cur.answer) {
      if (round === 2) setWrongList((w) => [...w, cur]);
      try {
        await upsertWrong("wrong_lc", "question", cur.question, { part: file.part, file_name: file.fileName, question: cur.question, correct_answer: cur.answer, user_answer: opt });
      } catch (e) {
        notify("오답 저장 실패 (Supabase): " + (e.message || e), true);
      }
    }
  };
  const next = () => {
    if (i + 1 >= roundQuizzes.length) {
      if (round === 2) setR2done(true);
      else if (round === 3) setR2done(true);
      return;
    }
    setI(i + 1); setPicked(null);
  };

  // 파트/파일 목록
  if (!file) {
    return (
      <div className="app">
        <Header title="🎧 LC 학습" onBack={onHome} />
        <div className="body">
          {parts.map((p) => (
            <div key={p.part}>
              <div className="group-title">{p.part} · {p.files.length}개</div>
              <div className="list">
                {p.files.map((f) => {
                  const cnt = (LC_QUIZZES[f.id] || []).length;
                  const ready = cnt > 0;
                  return (
                    <div key={f.id} className="list-item" style={ready ? null : { opacity: 0.5 }}
                      onClick={() => ready ? openFile(f) : notify("이 DAY는 아직 문제 준비중이에요", true)}>
                      <div className="li-ic" style={{ background: ready ? "var(--orange)" : "var(--muted)" }}>{"D" + f.day}</div>
                      <div><div className="li-tt">{f.title}</div><div className="li-sb">{ready ? cnt + "문제" : "🔒 준비중"}</div></div>
                      <div className="li-ar">{ready ? "›" : ""}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  const RoundPills = () => (
    <div className="round-pills">
      <div className={"round-pill " + (round === 1 ? "active" : round > 1 ? "done" : "")}>1회차 듣기</div>
      <div className={"round-pill " + (round === 2 ? "active" : round > 2 ? "done" : "")}>2회차 풀기</div>
      <div className={"round-pill " + (round === 3 ? "active" : "")}>3회차 오답</div>
    </div>
  );

  // 1회차: 듣기만
  if (round === 1) {
    return (
      <div className="app">
        <Header title={file.title} onBack={() => setFile(null)} meta="1회차" />
        <div className="body">
          <RoundPills />
          <AudioPlayer file={file} />
          <p className="empty" style={{ padding: "20px 10px" }}>먼저 음원을 충분히 들어보세요.<br />준비되면 문제를 풀어봅니다.</p>
          <button className="btn blue" onClick={() => startRound(2)}>2회차: 문제 풀기 →</button>
        </div>
      </div>
    );
  }

  // 2회차 / 3회차 결과
  if (r2done) {
    const noWrong = wrongList.length === 0;
    return (
      <div className="app">
        <Header title={file.title} onBack={() => setFile(null)} meta={round === 2 ? "2회차" : "3회차"} />
        <div className="body">
          <RoundPills />
          <div className="result">
            <div className="em">{round === 2 ? (noWrong ? "🌟" : "📝") : "✅"}</div>
            <h2>{round === 2 ? "2회차 완료!" : "3회차 완료!"}</h2>
            {round === 2 ? (
              <p className="empty" style={{ padding: "10px" }}>
                {noWrong ? "오답이 없어요! 완벽합니다 🎉" : `오답 ${wrongList.length}문제를 다시 풀어볼까요?`}
              </p>
            ) : (
              <p className="empty" style={{ padding: "10px" }}>오답 복습까지 끝냈어요!</p>
            )}
            {round === 2 && !noWrong && <button className="btn green" onClick={() => startRound(3)}>3회차: 오답만 다시 풀기 →</button>}
            <button className="btn ghost mt8" onClick={() => setFile(null)}>파일 목록으로</button>
            <button className="btn ghost mt8" onClick={onHome}>홈으로</button>
          </div>
        </div>
      </div>
    );
  }

  // 2/3회차 문제 풀이
  return (
    <div className="app">
      <Header title={file.title} onBack={() => setFile(null)} meta={`${round}회차 ${i + 1}/${roundQuizzes.length}`} />
      <div className="body">
        <RoundPills />
        <AudioPlayer file={file} />
        <ProgressBar cur={i + 1} total={roundQuizzes.length} />
        <div className="qbox">
          <span className="qtag">{file.part} · Q{i + 1}</span>
          <div className="qtext">{cur.question}</div>
        </div>
        <OptionList options={cur.options} picked={picked} answer={cur.answer} onPick={pick} disabled={picked != null} />
        {picked != null && (
          <div className={"explain " + (picked === cur.answer ? "ok" : "no")}>
            {picked === cur.answer ? "✅ 정답! " : "❌ 오답! 정답: "}<b>{cur.answer}</b><br />{cur.explanation}
          </div>
        )}
        {picked != null && (
          <button className="btn primary nav-btn-row" onClick={next}>
            {i + 1 >= roundQuizzes.length ? "회차 완료" : "다음 →"}
          </button>
        )}
      </div>
    </div>
  );
}

function WrongNote({ onHome }) {
  const { notify } = useContext(AppCtx);
  const [tab, setTab] = useState("word");
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(false);
  const [confirmAll, setConfirmAll] = useState(false);

  const tableOf = (t) => t === "word" ? "wrong_words" : t === "rc" ? "wrong_rc" : "wrong_lc";

  const load = async (t) => {
    setConfirmAll(false);
    if (!sbClient) { notify("Supabase 미연결 상태예요", true); setRows([]); return; }
    setLoading(true);
    try {
      const { data, error } = await sbClient.from(tableOf(t)).select("*").order("wrong_count", { ascending: false });
      if (error) throw error;
      setRows(data || []);
    } catch (e) {
      notify("불러오기 실패: " + (e.message || e), true);
      setRows([]);
    }
    setLoading(false);
  };

  useEffect(() => { load(tab); }, [tab]);

  const delOne = async (id) => {
    try {
      const { error } = await sbClient.from(tableOf(tab)).delete().eq("id", id);
      if (error) throw error;
      setRows((r) => r.filter((x) => x.id !== id));
    } catch (e) { notify("삭제 실패: " + (e.message || e), true); }
  };
  const delAll = async () => {
    try {
      const { error } = await sbClient.from(tableOf(tab)).delete().neq("id", "00000000-0000-0000-0000-000000000000");
      if (error) throw error;
      setRows([]); setConfirmAll(false);
      notify("전체 삭제 완료");
    } catch (e) { notify("전체 삭제 실패: " + (e.message || e), true); }
  };

  return (
    <div className="app">
      <Header title="📝 오답노트" onBack={onHome} />
      <div className="body">
        <div className="tabs">
          <button className={"tab " + (tab === "word" ? "active" : "")} onClick={() => setTab("word")}>단어</button>
          <button className={"tab " + (tab === "rc" ? "active" : "")} onClick={() => setTab("rc")}>RC</button>
          <button className={"tab " + (tab === "lc" ? "active" : "")} onClick={() => setTab("lc")}>LC</button>
        </div>

        <div className="toolbar">
          <button className="btn ghost" onClick={() => load(tab)}>🔄 새로고침</button>
          {rows.length > 0 && (confirmAll
            ? <button className="btn" style={{ background: "var(--red)", color: "#fff" }} onClick={delAll}>정말 전체삭제</button>
            : <button className="btn ghost" onClick={() => setConfirmAll(true)}>🗑 전체삭제</button>)}
        </div>

        {loading ? <div className="spinner">불러오는 중…</div>
          : rows.length === 0 ? <div className="empty"><div className="e">🗒️</div>오답 기록이 없어요</div>
          : (
            <div>
              {rows.map((r) => (
                <div key={r.id} className="wcard">
                  {tab === "word" && (
                    <div>
                      <div className="wtop">
                        <div><div className="wword">{r.word}</div><div className="wmean">{r.meaning}</div></div>
                        <span className="badge">{r.wrong_count}회</span>
                      </div>
                      <div className="wex">{r.example}</div>
                      <div className="wline"><span className="lab">마지막: </span>{fmtDate(r.last_wrong_at)}</div>
                    </div>
                  )}
                  {tab === "rc" && (
                    <div>
                      <span className="chip">{r.chapter}</span>
                      <div className="wtop">
                        <div className="wq">{r.question}</div>
                        <span className="badge">{r.wrong_count}회</span>
                      </div>
                      <div className="wline"><span className="lab">정답: </span><b>{r.correct_answer}</b></div>
                      <div className="wline"><span className="lab">내 답: </span>{r.user_answer}</div>
                      <div className="wline"><span className="lab">마지막: </span>{fmtDate(r.last_wrong_at)}</div>
                    </div>
                  )}
                  {tab === "lc" && (
                    <div>
                      <span className="chip">{r.part} · {r.file_name}</span>
                      <div className="wtop">
                        <div className="wq">{r.question}</div>
                        <span className="badge">{r.wrong_count}회</span>
                      </div>
                      <div className="wline"><span className="lab">정답: </span><b>{r.correct_answer}</b></div>
                      <div className="wline"><span className="lab">내 답: </span>{r.user_answer}</div>
                      <div className="wline"><span className="lab">마지막: </span>{fmtDate(r.last_wrong_at)}</div>
                      {r.script && <div className="wex" style={{ whiteSpace: "pre-line" }}>📜 {r.script}</div>}
                      <details style={{ marginTop: 8 }}>
                        <summary style={{ cursor: "pointer", fontWeight: 700, color: "var(--blue)" }}>🔁 섀도잉 (음원 반복 · 속도조절)</summary>
                        <AudioPlayer file={{ fileName: r.file_name, title: "섀도잉 · " + r.file_name, part: r.part }} />
                      </details>
                    </div>
                  )}
                  <button className="del" onClick={() => delOne(r.id)} style={{ marginTop: 8 }}>삭제</button>
                </div>
              ))}
            </div>
          )}
      </div>
    </div>
  );
}

// ===================== 오늘의 학습 ① LC 러너(2파일, 듣기→풀기) =====================
function LcRunnerDaily({ files, onBack, onDone }) {
  const { notify } = useContext(AppCtx);
  const [fi, setFi] = useState(0);
  const [round, setRound] = useState(1); // 1: 듣기, 2: 풀기
  const [i, setI] = useState(0);
  const [picked, setPicked] = useState(null);
  const [right, setRight] = useState(0);
  const [wrong, setWrong] = useState(0);

  const file = files[fi];
  const quizzes = LC_QUIZZES[file.id];
  const cur = quizzes[i];

  const pick = async (opt) => {
    if (picked != null) return;
    setPicked(opt);
    if (opt === cur.answer) {
      setRight((r) => r + 1);
    } else {
      setWrong((w) => w + 1);
      try {
        await upsertWrong("wrong_lc", "question", cur.question, { part: file.part, file_name: file.fileName, question: cur.question, correct_answer: cur.answer, user_answer: opt });
      } catch (e) {
        notify("오답 저장 실패 (Supabase): " + (e.message || e), true);
      }
    }
  };
  const next = () => {
    if (i + 1 < quizzes.length) { setI(i + 1); setPicked(null); return; }
    if (fi + 1 < files.length) { setFi(fi + 1); setRound(1); setI(0); setPicked(null); }
    else { onDone({ right, wrong }); }
  };

  if (round === 1) {
    return (
      <div className="app">
        <Header title={`오늘의 학습 · LC (3/3)`} onBack={onBack} meta={`파일 ${fi + 1}/${files.length}`} />
        <div className="body">
          <div className="round-pills">
            <div className="round-pill active">1회차 듣기</div>
            <div className="round-pill">2회차 풀기</div>
          </div>
          <AudioPlayer file={file} />
          <p className="empty" style={{ padding: "20px 10px" }}>먼저 음원을 충분히 들어보세요.</p>
          <button className="btn blue" onClick={() => { setRound(2); setI(0); setPicked(null); }}>2회차: 문제 풀기 →</button>
        </div>
      </div>
    );
  }
  return (
    <div className="app">
      <Header title={`오늘의 학습 · LC (3/3)`} onBack={onBack} meta={`파일 ${fi + 1}/${files.length} · ${i + 1}/${quizzes.length}`} />
      <div className="body">
        <div className="round-pills">
          <div className="round-pill done">1회차 듣기</div>
          <div className="round-pill active">2회차 풀기</div>
        </div>
        <AudioPlayer file={file} />
        <ProgressBar cur={i + 1} total={quizzes.length} />
        <div className="qbox">
          <span className="qtag">{file.part} · Q{i + 1}</span>
          <div className="qtext">{cur.question}</div>
        </div>
        <OptionList options={cur.options} picked={picked} answer={cur.answer} onPick={pick} disabled={picked != null} />
        {picked != null && (
          <div className={"explain " + (picked === cur.answer ? "ok" : "no")}>
            {picked === cur.answer ? "✅ 정답! " : "❌ 오답! 정답: "}<b>{cur.answer}</b><br />{cur.explanation}
          </div>
        )}
        {picked != null && (
          <button className="btn primary nav-btn-row" onClick={next}>
            {(i + 1 >= quizzes.length && fi + 1 >= files.length) ? "오늘의 학습 완료 🎉" : (i + 1 >= quizzes.length ? "다음 파일 →" : "다음 →")}
          </button>
        )}
      </div>
    </div>
  );
}

// ===================== 오늘의 학습 ② 메인 흐름 =====================
const RC_PLAN = [["품사구별", 2], ["시제", 1], ["능동수동", 1], ["접속사전치사", 1], ["관계사", 1], ["to부정사동명사", 1], ["분사", 1], ["비교급최상급", 1], ["가정법", 1]];
function pickDailyRc() {
  let out = [];
  RC_PLAN.forEach(([t, n]) => { out = out.concat(shuffle(RC_QUIZZES.filter((q) => q.type === t)).slice(0, n)); });
  return shuffle(out);
}
function pct(s) { if (!s) return 0; const t = s.right + s.wrong; return t ? Math.round((s.right / t) * 100) : 0; }

function DailyMode({ onHome, goWrong }) {
  const data = useMemo(() => ({
    words: shuffle(WORDS).slice(0, 20),
    rc: pickDailyRc(),
    lc: shuffle(LC_FILES.filter((f) => (LC_QUIZZES[f.id] || []).length > 0)).slice(0, 2),
  }), []);
  const [phase, setPhase] = useState("word");
  const [stat, setStat] = useState({ word: null, rc: null, lc: null });

  if (phase === "word") {
    return <WordRunner title="오늘의 학습 · 단어 (1/3)" words={data.words} onBack={onHome}
      onDone={(s) => { setStat((p) => ({ ...p, word: s })); setPhase("rc"); }} />;
  }
  if (phase === "rc") {
    return <RcRunner title="오늘의 학습 · RC (2/3)" quizzes={data.rc} onBack={onHome}
      onDone={(s) => { setStat((p) => ({ ...p, rc: s })); setPhase("lc"); }} />;
  }
  if (phase === "lc") {
    return <LcRunnerDaily files={data.lc} onBack={onHome}
      onDone={(s) => { setStat((p) => ({ ...p, lc: s })); setPhase("summary"); }} />;
  }
  // 요약
  return (
    <div className="app">
      <Header title="오늘의 학습 완료" onBack={onHome} />
      <div className="body">
        <div className="result">
          <div className="em">🎉</div>
          <h2>오늘의 학습 완료!</h2>
          <p className="msg" style={{ color: "var(--muted)", marginBottom: 8 }}>매일 꾸준히 출퇴근길 한 세션씩 💪</p>
        </div>
        <div className="score-row">
          <div className="sc"><div className="n" style={{ color: "var(--blue)" }}>{pct(stat.word)}%</div><div className="l">단어 ({stat.word.right}/{stat.word.right + stat.word.wrong})</div></div>
          <div className="sc"><div className="n" style={{ color: "var(--green)" }}>{pct(stat.rc)}%</div><div className="l">RC ({stat.rc.right}/{stat.rc.right + stat.rc.wrong})</div></div>
          <div className="sc"><div className="n" style={{ color: "var(--orange)" }}>{pct(stat.lc)}%</div><div className="l">LC ({stat.lc.right}/{stat.lc.right + stat.lc.wrong})</div></div>
        </div>
        <button className="btn primary" onClick={goWrong}>📝 오답노트 보러가기</button>
        <button className="btn ghost mt8" onClick={onHome}>홈으로</button>
      </div>
    </div>
  );
}

// ===================== 홈 =====================
// ===================== 문법 카드 모드 =====================
function GrammarMode({ onHome }) {
  const cards = GRAMMAR_CARDS;
  const [i, setI] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [pick, setPick] = useState(null);
  const c = cards[i];

  const go = (n) => { setI(n); setFlipped(false); setPick(null); };
  const prev = () => go((i - 1 + cards.length) % cards.length);
  const next = () => go((i + 1) % cards.length);

  // 미니 퀴즈 보기 파싱: "(reduce / reduction)" → ["reduce","reduction"]
  const m = c.quiz.sentence.match(/\(([^)]+)\)/);
  const choices = m ? m[1].split("/").map((s) => s.trim()) : [];
  const blanked = c.quiz.sentence.replace(/\([^)]+\)/, "_____");

  return (
    <div className="app">
      <Header title="📚 문법 카드" onBack={onHome} meta={`${i + 1}/${cards.length}`} />
      <div className="body">
        <ProgressBar cur={i + 1} total={cards.length} />
        <div className="gcard" onClick={() => !flipped && setFlipped(true)}
          style={{ background: "#fff", border: "1px solid var(--line)", borderRadius: 16, padding: 20, minHeight: 180, boxShadow: "0 4px 14px rgba(0,0,0,0.06)", cursor: flipped ? "default" : "pointer" }}>
          <span className="chip">Day {c.day} · {c.category}</span>
          {!flipped ? (
            <div style={{ textAlign: "center", padding: "24px 6px" }}>
              <div style={{ fontSize: 13, color: "var(--muted)", marginBottom: 6 }}>📌 {c.title}</div>
              <div style={{ fontSize: 19, fontWeight: 800, lineHeight: 1.4 }}>{c.rule}</div>
              <div style={{ marginTop: 22, fontSize: 13, color: "var(--blue)", fontWeight: 700 }}>👆 탭하여 뒤집기</div>
            </div>
          ) : (
            <div>
              <div style={{ fontSize: 17, fontWeight: 800, margin: "6px 0 10px" }}>{c.title}</div>
              <div style={{ fontSize: 14, color: "var(--muted)", marginBottom: 12 }}>{c.rule}</div>
              {c.items.map((it, k) => (
                <div key={k} style={{ marginBottom: 10, paddingLeft: 10, borderLeft: "3px solid var(--blue)" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "var(--blue)" }}>{it.type}</div>
                  <div style={{ fontSize: 14.5 }}>{it.example}</div>
                  <div style={{ fontSize: 13, color: "var(--muted)" }}>{it.kr}</div>
                </div>
              ))}
              <div className="explain no" style={{ marginTop: 10 }}>⚠️ {c.warning}</div>

              <div className="qbox" style={{ marginTop: 14 }}>
                <span className="qtag">미니 퀴즈</span>
                <div className="qtext" style={{ fontSize: 15 }}>{blanked}</div>
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                {choices.map((ch) => {
                  const isAns = ch === c.quiz.answer;
                  const picked = pick === ch;
                  let bg = "#fff", col = "var(--ink)", bd = "var(--line)";
                  if (pick != null && isAns) { bg = "var(--green)"; col = "#fff"; bd = "var(--green)"; }
                  else if (picked && !isAns) { bg = "var(--red)"; col = "#fff"; bd = "var(--red)"; }
                  return (
                    <button key={ch} onClick={() => pick == null && setPick(ch)}
                      style={{ flex: 1, padding: "12px", borderRadius: 10, border: `1px solid ${bd}`, background: bg, color: col, fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
                      {ch}
                    </button>
                  );
                })}
              </div>
              {pick != null && (
                <div className={"explain " + (pick === c.quiz.answer ? "ok" : "no")} style={{ marginTop: 8 }}>
                  {pick === c.quiz.answer ? "✅ 정답! " : "❌ 정답: "}<b>{c.quiz.answer}</b><br />{c.quiz.explanation}
                </div>
              )}
            </div>
          )}
        </div>

        <div className="ctrls" style={{ marginTop: 14 }}>
          <button className="btn ghost" style={{ flex: 1 }} onClick={prev}>← 이전</button>
          {!flipped
            ? <button className="btn blue" style={{ flex: 1 }} onClick={() => setFlipped(true)}>뒤집기</button>
            : <button className="btn primary" style={{ flex: 1 }} onClick={next}>다음 →</button>}
        </div>
        <button className="btn ghost mt8" onClick={onHome}>홈으로</button>
      </div>
    </div>
  );
}

function Home({ go }) {
  return (
    <div className="app">
      <div className="body">
        <div className="home-hero">
          <div className="logo">🚇</div>
          <h2>토익 지하철 공부</h2>
          <p>출퇴근길에 단어·RC·LC를 가볍게!</p>
        </div>
        <button className="btn" onClick={() => go("daily")}
          style={{ background: "linear-gradient(135deg,#1f2a44,#3b82f6)", color: "#fff", padding: "20px", fontSize: "18px", marginBottom: "16px", boxShadow: "0 8px 20px rgba(31,42,68,0.22)" }}>
          🚇 오늘의 학습 시작
          <div style={{ fontSize: "12px", fontWeight: 600, opacity: 0.85, marginTop: 4 }}>단어 20 → RC 10 → LC 2파일</div>
        </button>
        <div className="home-grid">
          <button className="home-btn" style={{ background: "linear-gradient(135deg,#3b82f6,#2563eb)" }} onClick={() => go("word")}>
            <div className="ic">📚</div><div className="nm">단어 학습</div><div className="ds">{WORDS.length}개 단어</div>
          </button>
          <button className="home-btn" style={{ background: "linear-gradient(135deg,#22a06b,#179561)" }} onClick={() => go("rc")}>
            <div className="ic">📖</div><div className="nm">RC 학습</div><div className="ds">{RC_QUIZZES.length}문제</div>
          </button>
          <button className="home-btn" style={{ background: "linear-gradient(135deg,#f08c2e,#e07b1a)" }} onClick={() => go("lc")}>
            <div className="ic">🎧</div><div className="nm">LC 학습</div><div className="ds">{LC_FILES.length}개 파일</div>
          </button>
          <button className="home-btn" style={{ background: "linear-gradient(135deg,#8b5cf6,#6d28d9)" }} onClick={() => go("grammar")}>
            <div className="ic">📚</div><div className="nm">문법 카드</div><div className="ds">{GRAMMAR_CARDS.length}장</div>
          </button>
          <button className="home-btn" style={{ background: "linear-gradient(135deg,#5b6b8c,#3f4d6b)" }} onClick={() => go("wrong")}>
            <div className="ic">📝</div><div className="nm">오답노트</div><div className="ds">단어·RC·LC</div>
          </button>
        </div>
        {!sbClient && (
          <div className="explain no" style={{ marginTop: 16 }}>
            ⚠️ Supabase에 연결되지 않았습니다. 오답 저장/조회가 동작하지 않을 수 있어요. (학습 기능은 정상)
          </div>
        )}
      </div>
    </div>
  );
}

// ===================== App =====================
function App() {
  const [screen, setScreen] = useState("home");
  const [toast, setToast] = useState(null);
  const notify = (msg, isErr) => {
    setToast({ msg, isErr });
    setTimeout(() => setToast(null), 3000);
  };
  const go = (s) => setScreen(s);
  const home = () => setScreen("home");

  return (
    <AppCtx.Provider value={{ notify }}>
      {screen === "home" && <Home go={go} />}
      {screen === "daily" && <DailyMode onHome={home} goWrong={() => setScreen("wrong")} />}
      {screen === "word" && <WordMode onHome={home} />}
      {screen === "rc" && <RcMode onHome={home} />}
      {screen === "lc" && <LcMode onHome={home} />}
      {screen === "grammar" && <GrammarMode onHome={home} />}
      {screen === "wrong" && <WrongNote onHome={home} />}
      {toast && <div className={"toast " + (toast.isErr ? "err" : "")}>{toast.msg}</div>}
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
